<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>行政書士 多肢選択・記述式 過去問</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
  background: #f5f4f0;
  color: #1a1a1a;
  min-height: 100vh;
  padding: 12px;
}

.container {
  max-width: 640px;
  margin: 0 auto;
}

/* タブ */
.tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 12px;
}

.tab-btn {
  flex: 1;
  padding: 10px 4px;
  border: 2px solid #1a1a2e;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  background: #fff;
  color: #1a1a2e;
  transition: all 0.15s;
}

.tab-btn.active {
  background: #1a1a2e;
  color: #fff;
}

/* フィルタ */
.filter-row {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
  align-items: center;
}

.filter-select {
  flex: 1;
  padding: 8px 10px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-family: inherit;
  font-size: 13px;
  background: #fff;
  color: #222;
}

.btn-random {
  padding: 8px 14px;
  background: #1a1a2e;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  white-space: nowrap;
}

/* ヘッダ */
header {
  text-align: center;
  padding: 12px 0 10px;
}

header .tag {
  display: inline-block;
  background: #1a1a2e;
  color: #fff;
  font-size: 11px;
  letter-spacing: 0.08em;
  padding: 3px 10px;
  border-radius: 20px;
  margin-bottom: 6px;
}

header h1 {
  font-size: 16px;
  font-weight: 700;
  color: #1a1a2e;
  line-height: 1.4;
}

header .sub {
  font-size: 11px;
  color: #888;
  margin-top: 3px;
}

/* ナビ */
.nav-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
}

.nav-btn {
  padding: 8px 14px;
  border: 1px solid #ccc;
  border-radius: 8px;
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
  background: #fff;
  color: #333;
}

.nav-btn:hover { background: #f0f0f0; }

.nav-count {
  flex: 1;
  text-align: center;
  font-size: 12px;
  color: #888;
}

/* 読み上げ */
.speak-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}

.speak-btn {
  padding: 8px 16px;
  border: 1px solid #1a1a2e;
  border-radius: 8px;
  font-size: 13px;
  font-family: inherit;
  font-weight: 700;
  cursor: pointer;
  background: #1a1a2e;
  color: #fff;
}

.speak-btn.speaking {
  background: #e05252;
  border-color: #e05252;
}

.auto-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: #444;
  cursor: pointer;
  user-select: none;
}

.auto-toggle input {
  width: 18px;
  height: 18px;
  accent-color: #1a1a2e;
}

/* プログレス */
.progress-wrap {
  margin-bottom: 12px;
}

.progress-bar-bg {
  background: #ddd;
  border-radius: 4px;
  height: 4px;
  overflow: hidden;
}

.progress-bar-fill {
  background: #1a1a2e;
  height: 100%;
  border-radius: 4px;
  transition: width 0.4s ease;
}

.progress-text {
  font-size: 11px;
  color: #888;
  margin-top: 4px;
  text-align: right;
}

/* カード */
.card {
  background: #fff;
  border-radius: 14px;
  padding: 18px;
  margin-bottom: 12px;
  border: 1px solid #e8e6e0;
}

.card-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  color: #888;
  margin-bottom: 10px;
  text-transform: uppercase;
}

.q-text {
  font-size: 13px;
  line-height: 2.0;
  color: #222;
}

.blank {
  position: relative;
  display: inline-block;
  vertical-align: middle;
  white-space: nowrap;
  text-align: center;
  padding: 1px 6px;
  margin: 0 1px;
  border: 1.5px solid #bbb;
  border-radius: 5px;
  background: #f4f4f6;
  font-weight: 700;
  transition: border-color 0.15s, background 0.15s;
}

/* 本物の答え（透明で場所を確保。選択時に色を出すだけ） */
.blank .bl-ans {
  visibility: hidden;
  color: #1a1a2e;
}

/* 空欄ラベル（ア/イ/ウ/エ）を確保した幅の中央に重ねて表示 */
.blank .bl-lab {
  position: absolute;
  left: 0;
  right: 0;
  top: 0;
  bottom: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #aaa;
}

.blank.active { border-color: #1a1a2e; background: #e9e9f2; }
.blank.active .bl-lab { color: #1a1a2e; }

.blank.answered .bl-ans { visibility: visible; }
.blank.answered .bl-lab { display: none; }

.blank.correct { border-color: #2a9d5c; background: #e6f4ec; }
.blank.correct .bl-ans { color: #1e7a44; }

.blank.wrong { border-color: #e05252; background: #fbeaea; }
.blank.wrong .bl-ans { color: #b93333; }

/* 解答パネル */
.answer-panel {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid #eee;
}

.answer-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 13px;
}

.answer-item .a-label {
  font-weight: 700;
  color: #888;
  min-width: 1em;
}

.answer-item .a-text {
  background: #f5f4f0;
  border: 1px solid #ddd;
  border-radius: 6px;
  padding: 2px 8px;
  font-size: 12px;
  color: #555;
  min-width: 4em;
  text-align: center;
}

.answer-item .a-text.correct {
  background: #e6f4ec;
  border-color: #2a9d5c;
  color: #1e7a44;
}

.answer-item .a-text.wrong {
  background: #fdecea;
  border-color: #e05252;
  color: #b93333;
}

/* 選択肢エリア */
/* 選択肢を画面下に固定（問題文をスクロールしても常に見える） */
.select-area {
  position: fixed;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 640px;
  bottom: 0;
  max-height: 46vh;
  overflow-y: auto;
  background: #fff;
  border-top: 1px solid #ddd;
  border-radius: 16px 16px 0 0;
  box-shadow: 0 -3px 14px rgba(0,0,0,0.13);
  padding: 0 16px calc(14px + env(safe-area-inset-bottom));
  z-index: 50;
  margin: 0;
}

/* 問題文の下に固定ドック分の余白を確保（解答中のみ） */
#takiSection.dock-on {
  padding-bottom: 48vh;
}

.select-label {
  font-size: 11px;
  color: #888;
  margin-bottom: 4px;
}

.current-q {
  position: sticky;
  top: 0;
  background: #fff;
  font-size: 14px;
  font-weight: 700;
  color: #1a1a2e;
  padding: 12px 0 10px;
  margin-bottom: 8px;
  border-bottom: 1px solid #eee;
  z-index: 1;
}

.choices {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 6px;
}

.choice-btn {
  background: #f5f4f0;
  border: 1px solid #e0ddd6;
  border-radius: 8px;
  padding: 9px 10px;
  font-size: 12px;
  color: #222;
  cursor: pointer;
  text-align: center;
  font-family: inherit;
  line-height: 1.4;
  transition: all 0.15s;
}

.choice-btn:hover { background: #eeedf8; border-color: #1a1a2e; }

.choice-btn.used {
  opacity: 0.3;
  pointer-events: none;
}

/* 結果 */
.result-card {
  background: #fff;
  border-radius: 14px;
  padding: 20px;
  border: 1px solid #e8e6e0;
  text-align: center;
  margin-bottom: 12px;
}

.result-score {
  font-size: 44px;
  font-weight: 800;
  color: #1a1a2e;
  line-height: 1;
  margin-bottom: 4px;
}

.result-score span {
  font-size: 18px;
  font-weight: 400;
  color: #888;
}

.result-label {
  font-size: 13px;
  color: #555;
  margin-bottom: 16px;
}

.result-detail {
  text-align: left;
  border-top: 1px solid #eee;
  padding-top: 14px;
  margin-bottom: 16px;
}

.result-row {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 7px 0;
  border-bottom: 1px solid #f0f0f0;
  font-size: 13px;
}

.result-row:last-child { border-bottom: none; }

.rr-icon { font-size: 14px; min-width: 16px; }
.rr-label { font-weight: 700; min-width: 16px; color: #1a1a2e; }
.rr-answer { flex: 1; }
.rr-your { color: #e05252; font-size: 11px; margin-top: 2px; }

.btn-next-q {
  width: 100%;
  background: #1a1a2e;
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 13px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  margin-top: 8px;
}

/* 記述式 */
.kijutsu-problem {
  font-size: 13px;
  line-height: 2.0;
  color: #222;
  white-space: pre-wrap;
}

.btn-reveal {
  width: 100%;
  background: #f0f0f0;
  color: #333;
  border: 1px solid #ccc;
  border-radius: 10px;
  padding: 12px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  margin-top: 4px;
  transition: background 0.2s;
}

.btn-reveal:hover { background: #e0e0e0; }

.answer-box {
  background: #1a1a2e;
  color: #e8e6ff;
  border-radius: 12px;
  padding: 16px;
  margin-top: 12px;
  font-size: 13px;
  line-height: 1.9;
}

.answer-box h3 {
  font-size: 12px;
  letter-spacing: 0.1em;
  color: #aaa;
  margin-bottom: 8px;
}

.answer-text {
  font-size: 14px;
  font-weight: 700;
  color: #fff;
  line-height: 1.8;
}

.hidden { display: none; }
</style>
</head>
<body>
<div class="container">

  <!-- タブ -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchMode('taki')">多肢選択式</button>
    <button class="tab-btn" onclick="switchMode('kijutsu')">記述式</button>
  </div>

  <!-- フィルタ -->
  <div class="filter-row">
    <select class="filter-select" id="yearFilter" onchange="applyFilter()">
      <option value="">全年度</option>
    </select>
    <button class="btn-random" onclick="goRandom()">ランダム</button>
  </div>

  <!-- ナビ -->
  <div class="nav-row">
    <button class="nav-btn" onclick="goPrev()">&lt; 前</button>
    <span class="nav-count" id="navCount">-</span>
    <button class="nav-btn" onclick="goNext()">次 &gt;</button>
  </div>

  <!-- 読み上げ -->
  <div class="speak-row">
    <button class="speak-btn" id="speakBtn" onclick="speakCurrent()">読み上げ</button>
    <label class="auto-toggle">
      <input type="checkbox" id="autoReadChk" checked onchange="toggleAuto()">
      <span>自動読み上げ</span>
    </label>
  </div>

  <!-- ======== 多肢選択式 ======== -->
  <div id="takiSection">

    <header>
      <div class="tag" id="takiTag">-</div>
      <h1 id="takiTitle">-</h1>
    </header>

    <div class="progress-wrap">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressBar"></div>
      </div>
      <div class="progress-text" id="progressText">0 / 4</div>
    </div>

    <div class="card">
      <div class="card-label">問題文</div>
      <div class="q-text" id="qText"></div>
    </div>

    <div class="select-area" id="selectArea">
      <div class="current-q" id="curLabel">-</div>
      <div class="choices" id="choices"></div>
    </div>

    <div class="result-card hidden" id="resultCard"></div>

  </div>

  <!-- ======== 記述式 ======== -->
  <div id="kijutsuSection" class="hidden">

    <header>
      <div class="tag" id="kijutsuTag">-</div>
      <h1 id="kijutsuTitle">記述式</h1>
    </header>

    <div class="card">
      <div class="card-label">問題</div>
      <div class="kijutsu-problem" id="kijutsuProblem"></div>
    </div>

    <button class="btn-reveal" id="revealBtn" onclick="revealAnswer()">模範解答を見る</button>

    <div class="answer-box hidden" id="answerBox">
      <h3>模範解答</h3>
      <div class="answer-text" id="answerText"></div>
    </div>

  </div>

</div>

<script>

ext": "権利利益"}, {"num": 17, "text": "国家補償"}, {"num": 18, "text": "通常受ける"}, {"num": 19, "text": "精神的"}, {"num": 20, "text": "行政上の強制執行"}]}, {"source": "令和6年（2024年）問43", "year": "令和6年", "seireki": 2024, "qnum": 43, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "questionHtml": "参議院の総議員の1/4以上である72名の議員は、平成29年6月22日、憲法53条後段の規定により、内閣に対し、国会の臨時会の召集を決定すること（以下「臨時会召集決定」という）を要求した。内閣は、同年9月22日、臨時会を同月28日に召集することを決定した。同日、第194回国会が召集されたが、その冒頭で衆議院が解散され、参議院は同時に閉会となった。本件は、上記の要求をした参議院議員の一人である上告人（原告）が、被上告人（国）に対し、主位的に、上告人が次に参議院の総議員の1/4以上の議員の一人として臨時会召集決定の要求（以下「臨時会召集要求」という）をした場合に、内閣において、20日以内に臨時会が召集されるよう臨時会召集決定をする義務を負うことの確認を、予備的に、上記場合に、上告人が20日以内に臨時会の召集を受けられる地位を有することの確認を求める（以下、これらの請求に係る訴えを「本件各確認の訴え」という）事案である。 本件各確認の訴えは、上告人が、個々の国会議員が臨時会召集要求に係る権利を有するという憲法53条後段の解釈を前提に、<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">公法上の法律関係</span><span class=\"bl-lab\">ア</span></span>に関する確認の訴えとして、上告人を含む参議院議員が同条後段の規定により上記権利を行使した場合に被上告人が上告人に対して負う法的義務または上告人が被上告人との間で有する法律上の地位の確認を求める訴えであると解されるから、当事者間の具体的な権利義務または法律関係の存否に関する紛争であって、法令の適用によって終局的に解決することができるものであるということができる。そうすると、本件各確認の訴えは、<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">法律上の争訟</span><span class=\"bl-lab\">イ</span></span>にあたるというべきであり、これと異なる原審の判断には、法令の解釈適用を誤った違法があるといわざるを得ない。 もっとも、本件各確認の訴えは、将来、上告人を含む参議院議員が憲法53条後段の規定により臨時会召集要求をした場合における臨時会召集決定の遅滞によって上告人自身に生ずる不利益を防止することを目的とする訴えであると解されるところ、将来、上告人を含む参議院の総議員の1/4以上により臨時会召集要求がされるか否かや、それがされた場合に臨時会召集決定がいつされるかは現時点では明らかでないといわざるを得ない。 そうすると、上告人に上記不利益が生ずる<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">現実の危険</span><span class=\"bl-lab\">ウ</span></span>があるとはいえず、本件各確認の訴えは、<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">確認の利益</span><span class=\"bl-lab\">エ</span></span>を欠き、不適法であるというべきであるから、これを却下すべきものとした原審の判断は、結論において是認することができる。 （最三小判令和5年9月12日民集77巻6号1515頁＜文章を一部修正した＞）", "blanks": [{"label": "ア", "answer": "公法上の法律関係"}, {"label": "イ", "answer": "法律上の争訟"}, {"label": "ウ", "answer": "現実の危険"}, {"label": "エ", "answer": "確認の利益"}], "choices": [{"num": 1, "text": "法律上保護された利益"}, {"num": 2, "tex
