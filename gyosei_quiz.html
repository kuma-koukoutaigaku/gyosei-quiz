label": "ウ", "answer": "公共の利害"}, {"label": "エ", "answer": "公益"}], "choices": [{"num": 1, "text": "名誉毀損"}, {"num": 2, "text": "公正な論評"}, {"num": 3, "text": "公共の安全"}, {"num": 4, "text": "私的自治"}, {"num": 5, "text": "公務の遂行"}, {"num": 6, "text": "公の批判"}, {"num": 7, "text": "実質的"}, {"num": 8, "text": "公益"}, {"num": 9, "text": "営利"}, {"num": 10, "text": "公正"}, {"num": 11, "text": "出版者の収益"}, {"num": 12, "text": "事実の摘示"}, {"num": 13, "text": "公共の利害"}, {"num": 14, "text": "国民の自己統治"}, {"num": 15, "text": "公権力の行使"}, {"num": 16, "text": "個別的"}, {"num": 17, "text": "合理的"}, {"num": 18, "text": "明確"}, {"num": 19, "text": "著者の自己実現"}, {"num": 20, "text": "公共の福祉"}]}, {"source": "令和5年（2023年）問42", "year": "令和5年", "seireki": 2023, "qnum": 42, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "questionHtml": "公営住宅法は、国及び地方公共団体が協力して、健康で文化的な生活を営むに足りる住宅を建設し、これを住宅に困窮する低額所得者に対して低廉な家賃で賃貸することにより、国民生活の安定と<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">社会福祉</span><span class=\"bl-lab\">ア</span></span>の増進に寄与することを目的とするものであって（1条）、この法律によって建設された公営住宅の使用関係については、管理に関する規定を設け、家賃の決定、明渡等について規定し（第3章）、また、法〔＝公営住宅法〕の委任（25条）に基づいて制定された条例〔＝東京都営住宅条例〕も、使用許可、使用申込、明渡等について具体的な定めをしているところである。右法及び条例の規定によれば、公営住宅の使用関係には、<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">公の営造物</span><span class=\"bl-lab\">イ</span></span>の利用関係として公法的な一面があることは否定しえないところであって、入居者の募集は公募の方法によるべきこと（法16条）などが定められており、また、特定の者が公営住宅に入居するためには、事業主体の長から使用許可を受けなければならない旨定められているのであるが（条例3条）、他方、入居者が右使用許可を受けて事業主体と入居者との間に公営住宅の使用関係が設定されたのちにおいては、前示のような法及び条例による規制はあっても、事業主体と入居者との間の法律関係は、基本的には私人間の家屋<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">賃貸借関係</span><span class=\"bl-lab\">ウ</span></span>と異なるところはなく、このことは、法が賃貸（1条、2条）等私法上の<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">賃貸借関係</span><span class=\"bl-lab\">ウ</span></span>に通常用いられる用語を使用して公営住宅の使用関係を律していることからも明らかであるといわなければならない。したがって、公営住宅の使用関係については、公営住宅法及びこれに基づく条例が特別法として民法及び借家法に優先して適用されるが、法及び条例に特別の定めがない限り、原則として一般法である民法及び借家法の適用があり、その契約関係を規律するについては、<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">信頼関係</span><span class=\"bl-lab\">エ</span></span>の法理の適用があるものと解すべきである。ところで、右法及び条例の規定によれば、事業主体は、公営住宅の入居者を決定するについては入居者を選択する自由を有しないものと解されるが、事業主体と入居者との間に公営住宅の使用関係が設定されたのちにおいては、両者の間には<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">信頼関係</span><span class=\"bl-lab\">エ</span></span>を基礎とする法律関係が存するものというべきであるから、公営住宅の使用者が法の定める公営住宅の明渡請求事由に該当する行為をした場合であっても、賃貸人である事業主体との間の<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">信頼関係</span><span class=\"bl-lab\">エ</span></span>を破壊するとは認め難い特段の事情があるときには、事業主体の長は、当該使用者に対し、その住宅の使用関係を取り消し、その明渡を請求することはできないものと解するのが相当である。<br>（最一小判昭和59年12月13日民集38巻12号1411頁〈文章を一部省略した。〉）", "blanks": [{"label": "ア", "answer": "社会福祉"}, {"label": "イ", "answer": "公の営造物"}, {"label": "ウ", "answer": "賃貸借関係"}, {"label": "エ", "answer": "信頼関係"}], "choices": [{"num": 1, "text": "民間活力"}, {"num": 2, "text": "私有財産"}, {"num": 3, "text": "信頼関係"}, {"num": 4, "text": "所有権移転関係"}, {"num": 5, "text": "社会福祉"}, {"num": 6, "text": "普通財産"}, {"num": 7, "text": "特別権力関係"}, {"num": 8, "text": "公法関係"}, {"num": 9, "text": "街づくり"}, {"num": 10, "text": "物品"}, {"num": 11, "text": "売買契約関係"}, {"num": 12, "text": "賃貸借関係"}, {"num": 13, "text": "公用物"}, {"num": 14, "text": "事業収益"}, {"num": 15, "text": "請負契約関係"}, {"num": 16, "text": "委託契約関係"}, {"num": 17, "text": "定住環境"}, {"num": 18, "text": "公の営造物"}, {"num": 19, "text": "管理関係"}, {"num": 20, "text": "一般権力関係"}]}, {"source": "令和5年（2023年）問43", "year": "令和5年", "seireki": 2023, "qnum": 43, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "questionHtml": "処分の取消しの訴え（行政事件訴訟法3条2項）には出訴期間の制限があり、当該処分があったことを知った日又は当該処分の日から一定期間を経過したときは、原則としてすることができない（同法14条1項、2項）。ただし、出訴期間が経過した後でも、当該処分が<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\"></span><span class=\"bl-lab\">ア</span></span>であれば、当該処分の取消しの訴えとは別の訴えで争うことができる。<br>そのような訴えとしては複数のものがある。まず、行政事件訴訟法上の法定抗告訴訟としては、<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">無効確認の訴え</span><span class=\"bl-lab\">イ</span></span>がこれに当たる。また、私法上の法律関係に関する訴訟においても処分が<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\"></span><span class=\"bl-lab\">ア</span></span>か否かが争われ得るところ、この訴えは<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">争点訴訟</span><span class=\"bl-lab\">ウ</span></span>と呼ばれ、行政事件訴訟法の一部が準用される。<br>最高裁判所の判例は、処分が<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\"></span><span class=\"bl-lab\">ア</span></span>であるというためには、当該処分に<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">重大かつ明白</span><span class=\"bl-lab\">エ</span></span>な瑕疵がなければならないとする考えを原則としている。", "blanks": [{"label": "ア", "answer": ""}, {"label": "イ", "answer": "無効確認の訴え"}, {"label": "ウ", "answer": "争点訴訟"}, {"label": "エ", "answer": "重大かつ明白"}], "choices": [{"num": 1, "text": "原始的不能"}, {"num": 2, "text": "行政不服申立て"}, {"num": 3, "text": "外見上客観的に明白"}, {"num": 4, "text": "住民訴訟"}, {"num": 5, "text": "撤回可能"}, {"num": 6, "text": "無効確認の訴え"}, {"num": 7, "text": "不当"}, {"num": 8, "text": "実質的当事者訴訟"}, {"num": 9, "text": "重大かつ明白"}, {"num": 10, "text": "差止めの訴え"}, {"num": 11, "text": "実体的"}, {"num": 12, "text": "仮の救済申立て"}, {"num": 13, "text": "形式的当事者訴訟"}, {"num": 14, "text": "無効"}, {"num": 15, "text": "義務付けの訴え"}, {"num": 16, "text": "重大又は明白"}, {"num": 17, "text": "客観訴訟"}, {"num": 18, "text": "手続的"}, {"num": 19, "text": "争点訴訟"}, {"num": 20, "text": "不作為の違法確認の訴え"}]}, {"source": "令和4年（2022年）問41", "year": "令和4年", "seireki": 2022, "qnum": 41, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "questionHtml": "<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">法律上</span><span class=\"bl-lab\">ア</span></span>の争訟は、①当事者間の具体的な権利義務ないし法律関係の存否に関する紛争であって、かつ、②それが法令の適用により終局的に解決することができるものに限られるとする当審の判例（引用略）に照らし、地方議会議員に対する出席停止の懲罰の取消しを求める訴えが、①②の要件を満たす以上、<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">法律上</span><span class=\"bl-lab\">ア</span></span>の争訟に当たることは明らかであると思われる。<br><span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">法律上</span><span class=\"bl-lab\">ア</span></span>の争訟については、憲法32条により国民に裁判を受ける権利が保障されており、また、<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">法律上</span><span class=\"bl-lab\">ア</span></span>の争訟について裁判を行うことは、憲法76条1項により司法権に課せられた義務であるから、本来、司法権を行使しないことは許されないはずであり、司法権に対する<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">外在的</span><span class=\"bl-lab\">イ</span></span>制約があるとして司法審査の対象外とするのは、かかる例外を正当化する<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">憲法上</span><span class=\"bl-lab\">ウ</span></span>の根拠がある場合に厳格に限定される必要がある。<br>国会については、国権の最高機関（憲法41条）としての<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">自律性</span><span class=\"bl-lab\">エ</span></span>を憲法が尊重していることは明確であり、憲法自身が議員の資格争訟の裁判権を議院に付与し（憲法55条）、議員が議院で行った演説、討論又は表決についての院外での免責規定を設けている（憲法51条）。しかし、地方議会については、憲法55条や51条のような規定は設けられておらず、憲法は、<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">自律性</span><span class=\"bl-lab\">エ</span></span>の点において、国会と地方議会を同視していないことは明らかである。<br>（最大判令和2年11月25日民集74巻8号2229頁、宇賀克也裁判官補足意見）", "blanks": [{"label": "ア", "answer": "法律上"}, {"label": "イ", "answer": "外在的"}, {"label": "ウ", "answer": "憲法上"}, {"label": "エ", "answer": "自律性"}], "choices": [{"num": 1, "text": "法令上"}, {"num": 2, "text": "一般的"}, {"num": 3, "text": "公法上"}, {"num": 4, "text": "地位"}, {"num": 5, "text": "自律性"}, {"num": 6, "text": "訴訟法上"}, {"num": 7, "text": "外在的"}, {"num": 8, "text": "必然的"}, {"num": 9, "text": "公益上"}, {"num": 10, "text": "法律上"}, {"num": 11, "text": "独立性"}, {"num": 12, "text": "社会的"}, {"num": 13, "text": "慣習法上"}, {"num": 14, "text": "権能"}, {"num": 15, "text": "私法上　16公共性"}, {"num": 16, "text": "偶然的"}, {"num": 17, "text": "実体法上"}, {"num": 18, "text": "判例法上"}, {"num": 19, "text": "憲法上"}]}, {"source": "令和4年（2022年）問42", "year": "令和4年", "seireki": 2022, "qnum": 42, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "questionHtml": "行政機関の保有する情報の公開に関する法律（行政機関情報公開法）に基づき、行政機関の長に対して、当該行政機関が保有する<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">行政文書</span><span class=\"bl-lab\">ア</span></span>の開示が請求された場合、当該行政機関の長は、当該<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">行政文書</span><span class=\"bl-lab\">ア</span></span>の開示又は不開示の決定（開示決定等）をしなければならない。<br>開示決定等は、行政手続法上の<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">申請に対する処分</span><span class=\"bl-lab\">イ</span></span>であるから、同法の定めによれば、当該行政機関の長は、不開示決定（部分開示決定を含む。）をする場合、原則として、開示請求者に対し、同時に、当該決定の<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">理由</span><span class=\"bl-lab\">ウ</span></span>を示さなければならない。<br>開示決定等に不服がある者は、行政不服審査法に基づく審査請求をすることができる。審査請求に対する裁決をすべき行政機関の長は、原則として、<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">情報公開・個人情報保護審査会</span><span class=\"bl-lab\">エ</span></span>に諮問しなければならない（当該行政機関の長が会計検査院長である場合を除く）。<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">情報公開・個人情報保護審査会</span><span class=\"bl-lab\">エ</span></span>は、必要があると認めるときは、諮問をした行政機関の長（諮問庁）に対し、<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">行政文書</span><span class=\"bl-lab\">ア</span></span>の提示を求めることができ、諮問庁は、これを拒むことができない。この審査請求においては、処分庁は、当初に示された<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">理由</span><span class=\"bl-lab\">ウ</span></span>と異なる<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">理由</span><span class=\"bl-lab\">ウ</span></span>を主張することもできる。", "blanks": [{"label": "ア", "answer": "行政文書"}, {"label": "イ", "answer": "申請に対する処分"}, {"label": "ウ", "answer": "理由"}, {"label": "エ", "answer": "情報公開・個人情報保護審査会"}], "choices": [{"num": 1, "text": "届出に対する処分"}, {"num": 2, "text": "個人情報保護委員会"}, {"num": 3, "text": "情報公開・個人情報保護審査会"}, {"num": 4, "text": "裁量処分"}, {"num": 5, "text": "公文書"}, {"num": 6, "text": "理由"}, {"num": 7, "text": "行政情報"}, {"num": 8, "text": "行政不服審査会"}, {"num": 9, "text": "解釈基準"}, {"num": 10, "text": "不利益処分"}, {"num": 11, "text": "申請に対する処分"}, {"num": 12, "text": "裁量基準"}, {"num": 13, "text": "国地方係争処理委員会"}, {"num": 14, "text": "行政文書ファイル"}, {"num": 15, "text": "審査基準"}, {"num": 16, "text": "公情報"}, {"num": 17, "text": "授益的処分"}, {"num": 18, "text": "処分基準"}, {"num": 19, "text": "行政文書"}, {"num": 20, "text": "情報公開委員会"}]}, {"source": "令和4年（2022年）問43", "year": "令和4年", "seireki": 2022, "qnum": 43, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "questionHtml": "国家補償制度は、国家賠償と損失補償によって構成されるが、両者のいずれによっても救済されない問題が存在する。公務員の<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">無過失</span><span class=\"bl-lab\">ア</span></span>の違法行為による被害は、国家賠償法の救済の対象とはならず、他方、憲法29条3項によって求められる損失補償は、<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">財産権</span><span class=\"bl-lab\">イ</span></span>以外の権利利益についての被害には及ばないと考えられるからである。この救済の空白地帯は「国家補償の谷間」と呼ばれている。<br>「国家補償の谷間」の典型事例は予防接種による副反応被害である。この事例を損失補償により救済するアプローチは、<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">財産権</span><span class=\"bl-lab\">イ</span></span>よりも重要な利益である生命・身体の利益は、当然に憲法29条3項に規定する損失補償の対象となるとする<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">勿論</span><span class=\"bl-lab\">ウ</span></span>解釈によって、救済を図ろうとする。<br>これに対して、国家賠償による救済のアプローチをとる場合、予防接種の性質上、予診を尽くしたとしても、接種を受けることが適切でない者（禁忌者）を完全に見分けることが困難であり、医師による予診を初めとする公務員の行為は<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">無過失</span><span class=\"bl-lab\">ア</span></span>とされる可能性が残る。この点について、最高裁判所昭和51年9月30日判決は、予防接種により重篤な副反応が発生した場合に、担当医師がこうした結果を予見しえたのに、過誤により予見しなかったものと<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">推定</span><span class=\"bl-lab\">エ</span></span>することで、実質的に、自らが<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">無過失</span><span class=\"bl-lab\">ア</span></span>であることの立証貢任を国側に負わせることで救済を図った。", "blanks": [{"label": "ア", "answer": "無過失"}, {"label": "イ", "answer": "財産権"}, {"label": "ウ", "answer": "勿論"}, {"label": "エ", "answer": "推定"}], "choices": [{"num": 1, "text": "自由裁量"}, {"num": 2, "text": "合憲限定"}, {"num": 3, "text": "生存権"}, {"num": 4, "text": "無過失"}, {"num": 5, "text": "正当な補償"}, {"num": 6, "text": "文理"}, {"num": 7, "text": "証明"}, {"num": 8, "text": "緊急避難"}, {"num": 9, "text": "重過失"}, {"num": 10, "text": "特別の犠牲"}, {"num": 11, "text": "推定"}, {"num": 12, "text": "職務外"}, {"num": 13, "text": "決定"}, {"num": 14, "text": "事実行為"}, {"num": 15, "text": "財産権"}, {"num": 16, "text": "確定"}, {"num": 17, "text": "反対"}, {"num": 18, "text": "憲法上の権利"}, {"num": 19, "text": "償うことのできない損害"}, {"num": 20, "text": "勿論"}]}, {"source": "令和3年（2021年）問41", "year": "令和3年", "seireki": 2021, "qnum": 41, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "questionHtml": "問題は、裁判員制度の下で裁判官と国民とにより構成される裁判体が、<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">刑事裁判</span><span class=\"bl-lab\">ア</span></span>に関する様々な憲法上の要請に適合した「<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">裁判所</span><span class=\"bl-lab\">イ</span></span>」といい得るものであるか否かにある。・・・（中略）・・・。<br>以上によれば、裁判員裁判対象事件を取り扱う裁判体は、身分保障の下、独立して職権を行使することが保障された裁判官と、公平性、中立性を確保できるよう配慮された手続の下に選任された裁判員とによって構成されるものとされている。また、裁判員の権限は、裁判官と共に公判廷で審理に臨み、評議において事実認定、<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">法令の適用</span><span class=\"bl-lab\">ウ</span></span>及び有罪の場合の刑の量定について意見を述べ、<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">評決</span><span class=\"bl-lab\">エ</span></span>を行うことにある。これら裁判員の関与する判断は、いずれも司法作用の内容をなすものであるが、必ずしもあらかじめ法律的な知識、経験を有することが不可欠な事項であるとはいえない。さらに、裁判長は、裁判員がその職責を十分に果たすことができるように配慮しなければならないとされていることも考慮すると、上記のような権限を付与された裁判員が、様々な視点や感覚を反映させつつ、裁判官との協議を通じて良識ある結論に達することは、十分期待することができる。他方、憲法が定める<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">刑事裁判</span><span class=\"bl-lab\">ア</span></span>の諸原則の保障は、裁判官の判断に委ねられている。<br>このような裁判員制度の仕組みを考慮すれば、公平な「<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">裁判所</span><span class=\"bl-lab\">イ</span></span>」における法と証拠に基づく適正な裁判が行われること（憲法31条、32条、37条1項）は制度的に十分保障されている上、裁判官は<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">刑事裁判</span><span class=\"bl-lab\">ア</span></span>の基本的な担い手とされているものと認められ、憲法が定める<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">刑事裁判</span><span class=\"bl-lab\">ア</span></span>の諸原則を確保する上での支障はないということができる。<br>（最大判平成23年11月16日刑集65巻8号1285頁）", "blanks": [{"label": "ア", "answer": "刑事裁判"}, {"label": "イ", "answer": "裁判所"}, {"label": "ウ", "answer": "法令の適用"}, {"label": "エ", "answer": "評決"}], "choices": [{"num": 1, "text": "憲法訴訟"}, {"num": 2, "text": "民事裁判"}, {"num": 3, "text": "裁決"}, {"num": 4, "text": "行政裁判"}, {"num": 5, "text": "情状酌量"}, {"num": 6, "text": "判例との関係"}, {"num": 7, "text": "司法権"}, {"num": 8, "text": "公開法廷"}, {"num": 9, "text": "判決"}, {"num": 10, "text": "紛争解決機関"}, {"num": 11, "text": "決定"}, {"num": 12, "text": "法令の解釈"}, {"num": 13, "text": "裁判所"}, {"num": 14, "text": "人身の自由"}, {"num": 15, "text": "立法事実"}, {"num": 16, "text": "評決"}, {"num": 17, "text": "参審制"}, {"num": 18, "text": "議決"}, {"num": 19, "text": "法令の適用"}, {"num": 20, "text": "刑事裁判"}]}, {"source": "令和3年（2021年）問42", "year": "令和3年", "seireki": 2021, "qnum": 42, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "questionHtml": "感染症法*の令和3年2月改正に関する次の会話の空欄<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">即時強制</span><span class=\"bl-lab\">ア</span></span>～<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">過料</span><span class=\"bl-lab\">エ</span></span>に当てはまる語句を、枠内の選択肢（1～20）から選びなさい。<br>教授A：　今日は最近の感染症法改正について少し検討してみましょう。<br>学生B：　はい、新型コロナウイルスの感染症防止対策を強化するために、感染症法が改正されたことはニュースで知りました。<br>教授A：　そうですね。改正のポイントは幾つかあったのですが、特に、入院措置に従わなかった者に対して新たに制裁を科することができるようになりました。もともと、入院措置とは、感染者を感染症指定医療機関等に強制的に入院させる措置であることは知っていましたか。<br>学生B：　はい、それは講学上は<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">即時強制</span><span class=\"bl-lab\">ア</span></span>に当たると言われていますが、直接強制に当たるとする説もあって、講学上の位置づけについては争いがあるようです。<br>教授A：　そのとおりです。この問題には決着がついていないようですので、これ以上は話題として取り上げないことにしましょう。では、改正のポイントについて説明してください。<br>学生B：　確か、当初の政府案では、懲役や100万円以下の<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">罰金</span><span class=\"bl-lab\">イ</span></span>を科すことができるとなっていました。<br>教授A：　よく知っていますね。これらは、講学上の分類では<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">行政刑罰</span><span class=\"bl-lab\">ウ</span></span>に当たりますね。その特徴はなんでしょうか。<br>学生B：　はい、刑法総則が適用されるほか、制裁を科す手続に関しても刑事訴訟法が適用されます。<br>教授A：　そのとおりですね。ただし、制裁として重すぎるのではないか、という批判もあったところです。<br>学生B：　結局、与野党間の協議で当初の政府案は修正されて、懲役や<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">罰金</span><span class=\"bl-lab\">イ</span></span>ではなく、<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">過料</span><span class=\"bl-lab\">エ</span></span>を科すことになりました。この<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">過料</span><span class=\"bl-lab\">エ</span></span>は講学上の分類では行政上の秩序罰に当たります。<br>教授A：　そうですね、制裁を科すとしても、その方法には様々なものがあることに注意しましょう。<br>（注） * 感染症の予防及び感染症の患者に対する医療に関する法律", "blanks": [{"label": "ア", "answer": "即時強制"}, {"label": "イ", "answer": "罰金"}, {"label": "ウ", "answer": "行政刑罰"}, {"label": "エ", "answer": "過料"}], "choices": [{"num": 1, "text": "罰金"}, {"num": 2, "text": "過料"}, {"num": 3, "text": "科料"}, {"num": 4, "text": "死刑"}, {"num": 5, "text": "公表"}, {"num": 6, "text": "即時強制"}, {"num": 7, "text": "行政代執行"}, {"num": 8, "text": "仮処分"}, {"num": 9, "text": "仮の義務付け"}, {"num": 10, "text": "間接強制"}, {"num": 11, "text": "課徴金"}, {"num": 12, "text": "行政刑罰"}, {"num": 13, "text": "拘留"}, {"num": 14, "text": "損失補償"}, {"num": 15, "text": "負担金"}, {"num": 16, "text": "禁固"}, {"num": 17, "text": "民事執行"}, {"num": 18, "text": "執行罰"}, {"num": 19, "text": "給付拒否"}, {"num": 20, "text": "社会的制裁"}]}, {"source": "令和3年（2021年）問43", "year": "令和3年", "seireki": 2021, "qnum": 43, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "questionHtml": "行政手続法14条1項本文が、不利益処分をする場合に同時にその理由を名宛人に示さなければならないとしているのは、名宛人に直接に義務を課し又はその権利を制限するという不利益処分の性質に鑑み、行政庁の判断の<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">慎重</span><span class=\"bl-lab\">ア</span></span>と合理性を担保してその恣意を抑制するとともに、処分の理由を名宛人に知らせて<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">不服の申立て</span><span class=\"bl-lab\">イ</span></span>に便宜を与える趣旨に出たものと解される。そして、同項本文に基づいてどの程度の理由を提示すべきかは、上記のような同項本文の趣旨に照らし、当該処分の根拠法令の規定内容、当該処分に係る<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">処分基準</span><span class=\"bl-lab\">ウ</span></span>の存否及び内容並びに公表の有無、当該処分の性質及び内容、当該処分の原因となる事実関係の内容等を総合考慮してこれを決定すべきである。<br>この見地に立って建築士法・・・（略）・・・による建築士に対する懲戒処分について見ると、・・・（略）・・・処分要件はいずれも抽象的である上、これらに該当する場合に・・・（略）・・・所定の戒告、1年以内の業務停止又は免許取消しのいずれの処分を選択するかも処分行政庁の裁量に委ねられている。そして、建築士に対する上記懲戒処分については、処分内容の決定に関し、本件<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">処分基準</span><span class=\"bl-lab\">ウ</span></span>が定められているところ、本件<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">処分基準</span><span class=\"bl-lab\">ウ</span></span>は、<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">意見公募</span><span class=\"bl-lab\">エ</span></span>の手続を経るなど適正を担保すべき手厚い手続を経た上で定められて公にされており、・・・（略）・・・多様な事例に対応すべくかなり複雑なものとなっている。<br>そうすると、建築士に対する上記懲戒処分に際して同時に示されるべき理由としては、処分の原因となる事実及び処分の根拠法条に加えて、本件<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">処分基準</span><span class=\"bl-lab\">ウ</span></span>の適用関係が示されなければ、処分の名宛人において、上記事実及び根拠法条の提示によって処分要件の該当性に係る理由は知り得るとしても、いかなる理由に基づいてどのような<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">処分基準</span><span class=\"bl-lab\">ウ</span></span>の適用によって当該処分が選択されたのかを知ることは困難であるのが通例であると考えられる。<br>（最三小判平成23年6月7日民集65巻4号2081頁）", "blanks": [{"label": "ア", "answer": "慎重"}, {"label": "イ", "answer": "不服の申立て"}, {"label": "ウ", "answer": "処分基準"}, {"label": "エ", "answer": "意見公募"}], "choices": [{"num": 1, "text": "公平"}, {"num": 2, "text": "審査基準"}, {"num": 3, "text": "名宛人以外の第三者"}, {"num": 4, "text": "弁明"}, {"num": 5, "text": "条例"}, {"num": 6, "text": "意見公募"}, {"num": 7, "text": "説明責任"}, {"num": 8, "text": "根拠"}, {"num": 9, "text": "慎重"}, {"num": 10, "text": "紛争の一回解決"}, {"num": 11, "text": "要綱"}, {"num": 12, "text": "諮問"}, {"num": 13, "text": "処分基準"}, {"num": 14, "text": "利害関係人"}, {"num": 15, "text": "議会の議決"}, {"num": 16, "text": "規則"}, {"num": 17, "text": "不服の申立て"}, {"num": 18, "text": "審査請求"}, {"num": 19, "text": "適法性"}, {"num": 20, "text": "聴聞"}]}, {"source": "令和2年（2020年）問41", "year": "令和2年", "seireki": 2020, "qnum": 41, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "questionHtml": "このような労働組合の結成を憲法および労働組合法で保障しているのは、社会的・経済的弱者である個々の労働者をして、その強者である<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">使用者</span><span class=\"bl-lab\">ア</span></span>との交渉において、対等の立場に立たせることにより、労働者の地位を向上させることを目的とするものであることは、さきに説示したとおりである。しかし、現実の政治・経済・社会機構のもとにおいて、労働者がその経済的地位の向上を図るにあたっては、単に対<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">使用者</span><span class=\"bl-lab\">ア</span></span>との交渉においてのみこれを求めても、十分にはその目的を達成することができず、労働組合が右の目的をより十分に達成するための手段として、その目的達成に必要な<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">政治活動</span><span class=\"bl-lab\">イ</span></span>や社会活動を行なうことを妨げられるものではない。<br>この見地からいって、本件のような地方議会議員の選挙にあたり、労働組合が、その組合員の居住地域の生活環境の改善その他生活向上を図るうえに役立たしめるため、その<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">利益代表</span><span class=\"bl-lab\">ウ</span></span>を議会に送り込むための選挙活動をすること、そして、その一方策として、いわゆる統一候補を決定し、組合を挙げてその選挙運動を推進することは、組合の活動として許されないわけではなく、また、統一候補以外の組合員であえて立候補しようとするものに対し、組合の所期の目的を達成するため、立候補を思いとどまるよう勧告または説得することも、それが単に勧告または説得にとどまるかぎり、組合の組合員に対する妥当な範囲の<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">統制</span><span class=\"bl-lab\">エ</span></span>権の行使にほかならず、別段、法の禁ずるところとはいえない。しかし、このことから直ちに、組合の勧告または説得に応じないで個人的に立候補した組合員に対して、組合の<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">統制</span><span class=\"bl-lab\">エ</span></span>をみだしたものとして、何らかの処分をすることができるかどうかは別個の問題である。<br>（最大判昭和43年12月4日刑集22巻13号1425頁）", "blanks": [{"label": "ア", "answer": "使用者"}, {"label": "イ", "answer": "政治活動"}, {"label": "ウ", "answer": "利益代表"}, {"label": "エ", "answer": "統制"}], "choices": [{"num": 1, "text": "統制"}, {"num": 2, "text": "過半数代表"}, {"num": 3, "text": "争議行為"}, {"num": 4, "text": "指揮命令"}, {"num": 5, "text": "政治献金"}, {"num": 6, "text": "国民"}, {"num": 7, "text": "地域代表"}, {"num": 8, "text": "政治活動"}, {"num": 9, "text": "支配"}, {"num": 10, "text": "公権力"}, {"num": 11, "text": "職能代表"}, {"num": 12, "text": "経済活動"}, {"num": 13, "text": "管理運営"}, {"num": 14, "text": "自律"}, {"num": 15, "text": "公益活動"}, {"num": 16, "text": "純粋代表"}, {"num": 17, "text": "利益代表"}, {"num": 18, "text": "国"}, {"num": 19, "text": "私的政府"}, {"num": 20, "text": "使用者"}]}, {"source": "令和2年（2020年）問42", "year": "令和2年", "seireki": 2020, "qnum": 42, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "questionHtml": "行政指導とは、相手方の任意ないし合意を前提として行政目的を達成しようとする行政活動の一形式である。<br>行政手続法は、行政指導につき、「行政機関がその任務又は<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">4：所掌事務</span><span class=\"bl-lab\">ア</span></span>の範囲内において一定の行政目的を実現するために特定の者に一定の作為又は不作為を求める指導、<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">9：勧告</span><span class=\"bl-lab\">イ</span></span>、助言その他の行為であって処分に該当しないもの」と定義し、行政指導に関する幾つかの条文を規定している。例えば、行政手続法は、行政指導<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">16：指針</span><span class=\"bl-lab\">ウ</span></span>につき、「同一の行政目的を実現するため一定の条件に該当する複数の者に対し行政指導をしようとするときにこれらの行政指導に共通してその内容となるべき事項」と定義し、これが、<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">6：意見公募</span><span class=\"bl-lab\">エ</span></span>手続の対象となることを定める規定がある。<br>行政指導は、一般的には、法的効果をもたないものとして処分性は認められず抗告訴訟の対象とすることはできないと解されているが、行政指導と位置付けられている行政活動に、処分性を認める最高裁判決も出現しており、医療法にもとづく<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">9：勧告</span><span class=\"bl-lab\">イ</span></span>について処分性を認めた最高裁判決（最二判平成17年7月15日民集59巻6号1661頁）が注目されている。", "blanks": [{"label": "ア", "answer": "4：所掌事務"}, {"label": "イ", "answer": "9：勧告"}, {"label": "ウ", "answer": "16：指針"}, {"label": "エ", "answer": "6：意見公募"}], "choices": [{"num": 1, "text": "通知"}, {"num": 2, "text": "通達"}, {"num": 3, "text": "聴聞"}, {"num": 4, "text": "所掌事務"}, {"num": 5, "text": "告示"}, {"num": 6, "text": "意見公募"}, {"num": 7, "text": "担当事務"}, {"num": 8, "text": "基準"}, {"num": 9, "text": "勧告"}, {"num": 10, "text": "命令"}, {"num": 11, "text": "弁明"}, {"num": 12, "text": "審理"}, {"num": 13, "text": "担任事務"}, {"num": 14, "text": "告知"}, {"num": 15, "text": "自治事務"}, {"num": 16, "text": "指針"}, {"num": 17, "text": "要綱"}, {"num": 18, "text": "規則"}, {"num": 19, "text": "所管事務"}, {"num": 20, "text": "指示"}]}, {"source": "令和2年（2020年）問43", "year": "令和2年", "seireki": 2020, "qnum": 43, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "questionHtml": "本件は、被上告人（議員）が、議会運営委員会が厳重注意処分の決定をし、市議会議長がこれを公表したこと（以下、これらの行為を併せて「本件措置等」という。）によって、その名誉を毀損され、精神的損害を被ったとして、上告人（市）に対し、国家賠償法1条1項に基づき損害賠償を求めるものである。これは、<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">11：私法上の権利利益</span><span class=\"bl-lab\">ア</span></span>の侵害を理由とする国家賠償請求であり、その性質上、法令の適用による終局的な解決に適しないものとはいえないから、本件訴えは、裁判所法3条1項にいう<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">18：法律上の争訟</span><span class=\"bl-lab\">イ</span></span>に当たり、適法というべきである。<br>もっとも、被上告人の請求は、本件視察旅行を正当な理由なく欠席したことを理由とする本件措置等が国家賠償法1条1項の適用上違法であることを前提とするものである。<br>普通地方公共団体の議会は、憲法の定める<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">5：地方自治の本旨</span><span class=\"bl-lab\">ウ</span></span>に基づき自律的な法規範を有するものであり、議会の議員に対する懲罰その他の措置については、<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">10：議会の内部規律</span><span class=\"bl-lab\">エ</span></span>の問題にとどまる限り、その自律的な判断に委ねるのが適当である。そして、このことは、上記の措置が<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">11：私法上の権利利益</span><span class=\"bl-lab\">ア</span></span>を侵害することを理由とする国家賠償請求の当否を判断する場合であっても、異なることはないというべきである。<br>したがって、普通地方公共団体の議会の議員に対する懲罰その他の措置が当該議員の<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">11：私法上の権利利益</span><span class=\"bl-lab\">ア</span></span>を侵害することを理由とする国家賠償請求の当否を判断するに当たっては、当該措置が<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">10：議会の内部規律</span><span class=\"bl-lab\">エ</span></span>の問題にとどまる限り、議会の自律的な判断を尊重し、これを前提として請求の当否を判断すべきものと解するのが相当である。<br>（最一小判平成31年2月14日民集73巻2号123頁）", "blanks": [{"label": "ア", "answer": "11：私法上の権利利益"}, {"label": "イ", "answer": "18：法律上の争訟"}, {"label": "ウ", "answer": "5：地方自治の本旨"}, {"label": "エ", "answer": "10：議会の内部規律"}], "choices": [{"num": 1, "text": "公法上の地位"}, {"num": 2, "text": "一般市民法秩序"}, {"num": 3, "text": "直接民主制"}, {"num": 4, "text": "既得権"}, {"num": 5, "text": "地方自治の本旨"}, {"num": 6, "text": "知る権利"}, {"num": 7, "text": "制度改革訴訟"}, {"num": 8, "text": "行政立法"}, {"num": 9, "text": "立法裁量"}, {"num": 10, "text": "議会の内部規律"}, {"num": 11, "text": "私法上の権利利益"}, {"num": 12, "text": "統治行為"}, {"num": 13, "text": "公法上の当事者訴訟"}, {"num": 14, "text": "道州制"}, {"num": 15, "text": "権力分立原理"}, {"num": 16, "text": "当不当"}, {"num": 17, "text": "自己情報コントロール権"}, {"num": 18, "text": "法律上の争訟"}, {"num": 19, "text": "抗告訴訟"}, {"num": 20, "text": "司法権"}]}, {"source": "令和元年（2019年）問41", "year": "令和元年", "seireki": 2019, "qnum": 41, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "questionHtml": "令和元年・2019｜問41｜憲法<br>放送は、憲法21条が規定する表現の自由の保障の下で、国民の知る権利を実質的に充足し、健全な民主主義の発達に寄与するものとして、国民に広く普及されるべきものである。放送法が、「放送が国民に最大限に普及されて、その効用をもたらすことを保障すること」、「放送の不偏不党、真実及び<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">自律</span><span class=\"bl-lab\">ア</span></span>を保障することによって、放送による表現の自由を確保すること」及び「放送に携わる者の職責を明らかにすることによって、放送が健全な民主主義の発達に資するようにすること」という原則に従って、放送を公共の福祉に適合するように規律し、その健全な発達を図ることを目的として（1条）制定されたのは、上記のような放送の意義を反映したものにほかならない。<br>上記の目的を実現するため、放送法は、・・・旧法下において社団法人日本放送協会のみが行っていた放送事業について、公共放送事業者と民間放送事業者とが、各々その長所を発揮するとともに、互いに他を啓もうし、各々その欠点を補い、放送により国民が十分福祉を享受することができるように図るべく、<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">二本立て体制</span><span class=\"bl-lab\">イ</span></span>を採ることとしたものである。そして、同法は、<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">二本立て体制</span><span class=\"bl-lab\">イ</span></span>の一方を担う公共放送事業者として原告を設立することとし、その目的、業務、運営体制等を前記のように定め、原告を、民主的かつ<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">多元</span><span class=\"bl-lab\">ウ</span></span>的な基盤に基づきつつ<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">自律</span><span class=\"bl-lab\">ア</span></span>的に運営される事業体として性格付け、これに公共の福祉のための放送を行わせることとしたものである。<br>放送法が、・・・原告につき、<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">営利</span><span class=\"bl-lab\">エ</span></span>を目的として業務を行うこと及び他人の営業に関する広告の放送をすることを禁止し・・・、事業運営の財源を受信設備設置者から支払われる受信料によって賄うこととしているのは、原告が公共的性格を有することをその財源の面から特徴付けるものである。<br>（最大判平成29年12月6日民集71巻10号1817頁）", "blanks": [{"label": "ア", "answer": "自律"}, {"label": "イ", "answer": "二本立て体制"}, {"label": "ウ", "answer": "多元"}, {"label": "エ", "answer": "営利"}], "choices": [{"num": 1, "text": "国営放送制"}, {"num": 2, "text": "党利党略"}, {"num": 3, "text": "政府広報"}, {"num": 4, "text": "特殊利益"}, {"num": 5, "text": "良心"}, {"num": 6, "text": "自由競争体制"}, {"num": 7, "text": "品位"}, {"num": 8, "text": "誠実"}, {"num": 9, "text": "自律"}, {"num": 10, "text": "二本立て体制"}, {"num": 11, "text": "多元"}, {"num": 12, "text": "国際"}, {"num": 13, "text": "娯楽"}, {"num": 14, "text": "全国"}, {"num": 15, "text": "地域"}, {"num": 16, "text": "部分規制"}, {"num": 17, "text": "集中"}, {"num": 18, "text": "免許制"}, {"num": 19, "text": "自主管理"}, {"num": 20, "text": "営利"}]}, {"source": "令和元年（2019年）問42", "year": "令和元年", "seireki": 2019, "qnum": 42, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "questionHtml": "令和元年・2019｜問42｜行政法<br>行政手続法は、行政運営における<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">公正</span><span class=\"bl-lab\">ア</span></span>の確保と透明の向上を図り、もって国民の権利利益の保護に資することをその目的とし（1条1項）、行政庁は、<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">不利益</span><span class=\"bl-lab\">イ</span></span>処分をするかどうか又はどのような<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">不利益</span><span class=\"bl-lab\">イ</span></span>処分とするかについてその法令の定めに従って判断するために必要とされる基準である<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">処分基準</span><span class=\"bl-lab\">ウ</span></span>（2条8号ハ）を定め、かつ、これを公にしておくよう努めなければならないものと規定している（12条1項）。上記のような行政手続法の規定の文言や趣旨等に照らすと、同法12条1項に基づいて定められ公にされている<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">処分基準</span><span class=\"bl-lab\">ウ</span></span>は、単に行政庁の行政運営上の便宜のためにとどまらず、<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">不利益</span><span class=\"bl-lab\">イ</span></span>処分に係る判断過程の<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">公正</span><span class=\"bl-lab\">ア</span></span>と透明性を確保し、その相手方の権利利益の保護に資するために定められ公にされるものというべきである。したがって、行政庁が同項の規定により定めて公にしている<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">処分基準</span><span class=\"bl-lab\">ウ</span></span>において、先行の処分を受けたことを理由として後行の処分に係る量定を加重する旨の<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">不利益</span><span class=\"bl-lab\">イ</span></span>な取扱いの定めがある場合に、当該行政庁が後行の処分につき当該<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">処分基準</span><span class=\"bl-lab\">ウ</span></span>の定めと異なる取扱いをするならば、<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">裁量権</span><span class=\"bl-lab\">エ</span></span>の行使における<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">公正</span><span class=\"bl-lab\">ア</span></span>かつ平等な取扱いの要請や基準の内容に係る相手方の信頼の保護等の観点から、当該<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">処分基準</span><span class=\"bl-lab\">ウ</span></span>の定めと異なる取扱いをすることを相当と認めるべき特段の事情がない限り、そのような取扱いは<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">裁量権</span><span class=\"bl-lab\">エ</span></span>の範囲の逸脱又はその濫用に当たることとなるものと解され、この意味において、当該行政庁の後行の処分における<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">裁量権</span><span class=\"bl-lab\">エ</span></span>は当該<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">処分基準</span><span class=\"bl-lab\">ウ</span></span>に従って行使されるべきことがき束されており、先行の処分を受けた者が後行の処分の対象となるときは、上記特段の事情がない限り当該<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">処分基準</span><span class=\"bl-lab\">ウ</span></span>の定めにより所定の量定の加重がされることになるものということができる。以上に鑑みると、行政手続法12条1項の規定により定められ公にされている<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">処分基準</span><span class=\"bl-lab\">ウ</span></span>において、先行の処分を受けたことを理由として後行の処分に係る量定を加重する旨の<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">不利益</span><span class=\"bl-lab\">イ</span></span>な取扱いの定めがある場合には、上記先行の処分に当たる処分を受けた者は、将来において上記後行の処分に当たる処分の対象となり得るときは、上記先行の処分に当たる処分の効果が期間の経過によりなくなった後においても、当該<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">処分基準</span><span class=\"bl-lab\">ウ</span></span>の定めにより上記の<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">不利益</span><span class=\"bl-lab\">イ</span></span>な取扱いを受けるべき期間内はなお当該処分の取消しによって回復すべき法律上の利益を有するものと解するのが相当である。<br>（最三小判平成27年3月3日民集69巻2号143頁）", "blanks": [{"label": "ア", "answer": "公正"}, {"label": "イ", "answer": "不利益"}, {"label": "ウ", "answer": "処分基準"}, {"label": "エ", "answer": "裁量権"}], "choices": [{"num": 1, "text": "処分基準"}, {"num": 2, "text": "合理的"}, {"num": 3, "text": "衡平"}, {"num": 4, "text": "適正"}, {"num": 5, "text": "迅速性"}, {"num": 6, "text": "公正"}, {"num": 7, "text": "利益"}, {"num": 8, "text": "侵害"}, {"num": 9, "text": "授益"}, {"num": 10, "text": "不平等"}, {"num": 11, "text": "審査基準"}, {"num": 12, "text": "不利益"}, {"num": 13, "text": "解釈基準"}, {"num": 14, "text": "行政規則"}, {"num": 15, "text": "法規命令"}, {"num": 16, "text": "解釈権"}, {"num": 17, "text": "判断権"}, {"num": 18, "text": "処分権"}, {"num": 19, "text": "裁量権"}, {"num": 20, "text": "決定権"}]}, {"source": "令和元年（2019年）問43", "year": "令和元年", "seireki": 2019, "qnum": 43, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "questionHtml": "令和元年・2019｜問43｜行政法<br>行政事件訴訟法は、行政事件訴訟の類型を、抗告訴訟、<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">当事者</span><span class=\"bl-lab\">ア</span></span>訴訟、民衆訴訟、機関訴訟の4つとしている。<br>抗告訴訟は、公権力の行使に関する不服の訴訟をいうものとされる。処分や裁決の取消しを求める取消訴訟がその典型である。<br><span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">当事者</span><span class=\"bl-lab\">ア</span></span>訴訟には、<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">当事者</span><span class=\"bl-lab\">ア</span></span>間の法律関係を確認しまたは形成する処分・裁決に関する訴訟で法令の規定によりこの訴訟類型とされる形式的<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">当事者</span><span class=\"bl-lab\">ア</span></span>訴訟と、公法上の法律関係に関する訴えを包括する実質的<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">当事者</span><span class=\"bl-lab\">ア</span></span>訴訟の2種類がある。後者の例を請求上の内容に性質に照らして見ると、国籍確認を求める訴えのような確認訴訟のほか、公法上の法律関係に基づく金銭の支払を求める訴えのような<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">給付</span><span class=\"bl-lab\">イ</span></span>訴訟もある。<br><span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">当事者</span><span class=\"bl-lab\">ア</span></span>訴訟は、公法上の法律関係に関する訴えであるが、私法上の法律関係に関する訴えで処分・裁決の効力の有無が<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">争点</span><span class=\"bl-lab\">ウ</span></span>となっているものは、<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">争点</span><span class=\"bl-lab\">ウ</span></span>訴訟と呼ばれる。基礎となっている法律関係の性質から、<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">争点</span><span class=\"bl-lab\">ウ</span></span>訴訟は行政事件訴訟ではないと位置付けられる。例えば、土地収用法に基づく収用裁決が無効であることを前提として、起業者に対し土地の明け渡しという<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">給付</span><span class=\"bl-lab\">イ</span></span>を求める訴えは、<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">争点</span><span class=\"bl-lab\">ウ</span></span>訴訟である。<br>民衆訴訟は、国または公共団体の機関の法規に適合しない行為の是正を求める訴訟で、選挙人たる資格その他自己の法律上の利益にかかわらない資格で提起するものをいう。例えば、普通地方公共団体の公金の支出が違法だとして<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">住民</span><span class=\"bl-lab\">エ</span></span>監査請求をしたにもかかわらず監査委員が是正の措置をとらない場合に、当該普通地方公共団体の<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">住民</span><span class=\"bl-lab\">エ</span></span>としての資格で提起する<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">住民</span><span class=\"bl-lab\">エ</span></span>訴訟は民衆訴訟の一種である。<br>機関訴訟は、国または公共団体の機関相互間における権限の存否またはその行使に関する紛争についての訴訟をいう。法定受託事務の管理や執行について国の大臣が提起する地方自治法所定の代執行訴訟がその例である。", "blanks": [{"label": "ア", "answer": "当事者"}, {"label": "イ", "answer": "給付"}, {"label": "ウ", "answer": "争点"}, {"label": "エ", "answer": "住民"}], "choices": [{"num": 1, "text": "規範統制"}, {"num": 2, "text": "財務"}, {"num": 3, "text": "義務付け"}, {"num": 4, "text": "給付"}, {"num": 5, "text": "代表"}, {"num": 6, "text": "前提問題"}, {"num": 7, "text": "客観"}, {"num": 8, "text": "差止め"}, {"num": 9, "text": "未確定"}, {"num": 10, "text": "職員"}, {"num": 11, "text": "審査対象"}, {"num": 12, "text": "争点"}, {"num": 13, "text": "要件事実"}, {"num": 14, "text": "当事者"}, {"num": 15, "text": "主観"}, {"num": 16, "text": "国家賠償"}, {"num": 17, "text": "保留"}, {"num": 18, "text": "住民"}, {"num": 19, "text": "民事"}, {"num": 20, "text": "基準"}]}, {"source": "平成30年（2018年）問41", "year": "平成30年", "seireki": 2018, "qnum": 41, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "questionHtml": "公務員の政治的自由に関する次の文章の空欄<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">中立</span><span class=\"bl-lab\">ア</span></span>～<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">裁量</span><span class=\"bl-lab\">エ</span></span>に当てはまる語句を、枠内の選択肢（1～20）から選びなさい。<br>〔国家公務員法〕102条1項は、公務員の職務の遂行の政治的<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">中立</span><span class=\"bl-lab\">ア</span></span>性を保持することによって行政の<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">中立</span><span class=\"bl-lab\">ア</span></span>的運営を確保し、これに対する国民の信頼を維持することを目的とするものと解される。<br>他方、国民は、憲法上、表現の自由（21条1項）としての政治活動の自由を保障されており、この精神的自由は立憲民主政の政治過程にとって不可欠の基本的人権であって、民主主義社会を基礎付ける重要な権利であることに鑑みると、上記の目的に基づく法令による公務員に対する政治的行為の禁止は、国民としての政治活動の自由に対する必要やむを得ない限度にその範囲が画されるべきものである。<br>このような〔国家公務員法〕102条1項の文言、趣旨、目的や規制される政治活動の自由の重要性に加え、同項の規定が刑罰法規の構成要件となることを考慮すると、同項にいう「政治的行為」とは、公務員の職務の遂行の政治的<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">中立</span><span class=\"bl-lab\">ア</span></span>性を損なうおそれが、観念的なものにとどまらず、現実的に起こり得るものとして<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">実質</span><span class=\"bl-lab\">イ</span></span>的に認められるものを指し、同項はそのような行為の類型の具体的な定めを人事院規則に委任したものと解するのが相当である。・・・（中略）・・・。<br>・・・本件配布行為は、<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">管理職</span><span class=\"bl-lab\">ウ</span></span>的地位になく、その職務の内容や権限に<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">裁量</span><span class=\"bl-lab\">エ</span></span>の余地のない公務員によって、職務と全く無関係に、公務員により組織される団体の活動としての性格もなく行われたものであり、公務員による行為と認識し得る態様で行われたものでもないから、公務員の職務の遂行の政治的<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">中立</span><span class=\"bl-lab\">ア</span></span>性を損なうおそれが<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">実質</span><span class=\"bl-lab\">イ</span></span>的に認められるものとはいえない。そうすると、本件配布行為は本件罰則規定の構成要件に該当しないというべきである。<br>（最二小判平成24年12月7日刑集66巻12号1337頁）", "blanks": [{"label": "ア", "answer": "中立"}, {"label": "イ", "answer": "実質"}, {"label": "ウ", "answer": "管理職"}, {"label": "エ", "answer": "裁量"}], "choices": [{"num": 1, "text": "従属"}, {"num": 2, "text": "平等"}, {"num": 3, "text": "合法"}, {"num": 4, "text": "穏健"}, {"num": 5, "text": "裁量"}, {"num": 6, "text": "実質"}, {"num": 7, "text": "潜在"}, {"num": 8, "text": "顕在"}, {"num": 9, "text": "抽象"}, {"num": 10, "text": "一般"}, {"num": 11, "text": "権力"}, {"num": 12, "text": "現業"}, {"num": 13, "text": "経営者"}, {"num": 14, "text": "指導者"}, {"num": 15, "text": "管理職"}, {"num": 16, "text": "違法"}, {"num": 17, "text": "濫用"}, {"num": 18, "text": "逸脱"}, {"num": 19, "text": "中立"}, {"num": 20, "text": "強制"}]}, {"source": "平成30年（2018年）問42", "year": "平成30年", "seireki": 2018, "qnum": 42, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "questionHtml": "行政事件訴訟法10条は、二つの「取消しの理由の制限」を定めている。次の文章の空欄<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">自己の法律上の利益</span><span class=\"bl-lab\">ア</span></span>～<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">処分の違法</span><span class=\"bl-lab\">エ</span></span>に当てはまる語句を、枠内の選択肢（1～20）から選びなさい。<br>第一に、「取消訴訟においては、<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">自己の法律上の利益</span><span class=\"bl-lab\">ア</span></span>に関係のない違法を理由として取消しを求めることができない」（10条1項）。これは、訴えが仮に適法なものであったとしても、<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">自己の法律上の利益</span><span class=\"bl-lab\">ア</span></span>に関係のない違法を理由に取消しを求めることはできない（そのような違法事由しか主張していない訴えについては<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">請求を棄却する判決</span><span class=\"bl-lab\">イ</span></span>が下されることになる）ことを規定するものと解されている。取消訴訟が（国民の権利利益の救済を目的とする）主観訴訟であることにかんがみ、主観訴訟における当然の制限を規定したものにすぎないとの評価がある反面、違法事由のなかにはそれが<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">自己の法律上の利益</span><span class=\"bl-lab\">ア</span></span>に関係するものかどうかが不明確な場合もあり、「<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">自己の法律上の利益</span><span class=\"bl-lab\">ア</span></span>に関係のない違法」を広く解すると、国民の権利利益の救済の障害となる場合もあるのではないかとの指摘もある。<br>第二に、「処分の取消しの訴えとその処分についての<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">審査請求を棄却した裁決</span><span class=\"bl-lab\">ウ</span></span>の取消しの訴えとを提起することができる場合には」、<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">審査請求を棄却した裁決</span><span class=\"bl-lab\">ウ</span></span>の取消しの訴えにおいては「<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">処分の違法</span><span class=\"bl-lab\">エ</span></span>を理由として取消しを求めることができない」（10条2項）。これは、<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">処分の違法</span><span class=\"bl-lab\">エ</span></span>は、処分取消訴訟において主張しなければならないという原則（原処分主義）を規定するものと解されている。", "blanks": [{"label": "ア", "answer": "自己の法律上の利益"}, {"label": "イ", "answer": "請求を棄却する判決"}, {"label": "ウ", "answer": "審査請求を棄却した裁決"}, {"label": "エ", "answer": "処分の違法"}], "choices": [{"num": 1, "text": "審査請求を棄却した裁決"}, {"num": 2, "text": "処分を差止める判決"}, {"num": 3, "text": "訴えを却下する判決"}, {"num": 4, "text": "処分の無効"}, {"num": 5, "text": "処分取消裁決"}, {"num": 6, "text": "処分の違法"}, {"num": 7, "text": "法律上保護された利益"}, {"num": 8, "text": "裁決の違法"}, {"num": 9, "text": "不作為の違法"}, {"num": 10, "text": "裁決の無効"}, {"num": 11, "text": "自己の法律上の利益"}, {"num": 12, "text": "審査請求を認容した裁決"}, {"num": 13, "text": "処分により保護される利益"}, {"num": 14, "text": "請求を認容する判決"}, {"num": 15, "text": "処分を義務付ける判決"}, {"num": 16, "text": "請求を棄却する判決"}, {"num": 17, "text": "処分取消判決"}, {"num": 18, "text": "法律上保護に値する利益"}, {"num": 19, "text": "事情判決"}, {"num": 20, "text": "裁判上保護されるべき利益"}]}, {"source": "平成30年（2018年）問43", "year": "平成30年", "seireki": 2018, "qnum": 43, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "questionHtml": "・・・<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">住民自治</span><span class=\"bl-lab\">ア</span></span>の原則は地方公共団体の組織及び運営に関する基本原則であり、また、地方公共団体のような行政主体が一定内容の将来にわたって継続すべき施策を決定した場合でも、右施策が社会情勢の変動等に伴って変更されることがあることはもとより当然であって、地方公共団体は原則として右決定に拘束されるものではない。しかし、右決定が、単に一定内容の継続的な施策を定めるにとどまらず、特定の者に対して右施策に適合する特定内容の活動をすることを促す個別的、具体的な勧告ないし勧誘を伴うものであり、かつ、その活動が相当長期にわたる当該施策の継続を前提としてはじめてこれに投入する資金又は労力に相応する効果を生じうる性質のものである場合には、右特定の者は、右施策が右活動の基盤として維持されるものと<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">信頼</span><span class=\"bl-lab\">イ</span></span>し、これを前提として右の活動ないしその準備活動に入るのが通常である。このような状況のもとでは、たとえ右勧告ないし勧誘に基づいてその者と当該地方公共団体との聞に右施策の維持を内容とする契約が締結されたものとは認められない場合であっても、右のように密接な交渉を持つに至った当事者間の関係を規律すべき<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">信義衡平</span><span class=\"bl-lab\">ウ</span></span>の原則に照らし、その施策の変更にあたってはかかる<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">信頼</span><span class=\"bl-lab\">イ</span></span>に対して法的保護が与えられなければならないものというべきである。すなわち、右施策が変更されることにより、前記の勧告等に動機づけられて前記のような活動に入った者がその<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">信頼</span><span class=\"bl-lab\">イ</span></span>に反して所期の活動を妨げられ、社会観念上看過することのできない程度の積極的損害を被る場合に、地方公共団体において右損害を補償するなどの代償的措置を講ずることなく施策を変更することは、それがやむをえない客観的事情によるのでない限り、当事者間に形成された<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">信頼</span><span class=\"bl-lab\">イ</span></span>関係を不当に破壊するものとして違法性を帯び、地方公共団体の<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">不法行為</span><span class=\"bl-lab\">エ</span></span>責任を生ぜしめるものといわなければならない。そして、前記<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">住民自治</span><span class=\"bl-lab\">ア</span></span>の原則も、地方公共団体が住民の意思に基づいて行動する場合にはその行動になんらの法的責任も伴わないということを意味するものではないから、地方公共団体の施策決定の基盤をなす政治情勢の変化をもってただちに前記のやむをえない客観的事情にあたるものとし、前記のような相手方の<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">信頼</span><span class=\"bl-lab\">イ</span></span>を保護しないことが許されるものと解すべきではない。<br>（最三小判昭和56年1月27日民集35巻1号35頁）", "blanks": [{"label": "ア", "answer": "住民自治"}, {"label": "イ", "answer": "信頼"}, {"label": "ウ", "answer": "信義衡平"}, {"label": "エ", "answer": "不法行為"}], "choices": [{"num": 1, "text": "信義衡平"}, {"num": 2, "text": "私的自治"}, {"num": 3, "text": "公平"}, {"num": 4, "text": "信頼"}, {"num": 5, "text": "確約"}, {"num": 6, "text": "契約"}, {"num": 7, "text": "財産"}, {"num": 8, "text": "債務不履行"}, {"num": 9, "text": "不法行為"}, {"num": 10, "text": "団体自治"}, {"num": 11, "text": "平等"}, {"num": 12, "text": "刑事"}, {"num": 13, "text": "住民自治"}, {"num": 14, "text": "比例"}, {"num": 15, "text": "権利濫用禁止"}, {"num": 16, "text": "過失"}, {"num": 17, "text": "期待"}, {"num": 18, "text": "継続"}, {"num": 19, "text": "監督"}, {"num": 20, "text": "措置"}]}, {"source": "平成29年（2017年）問41", "year": "平成29年", "seireki": 2017, "qnum": 41, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "questionHtml": "その保障の根拠に照らして考えるならば、表現の自由といつても、そこにやはり一定の限界があることを否定し難い。<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">20</span><span class=\"bl-lab\">ア</span></span>が真実に反する場合、そのすべての言論を保護する必要性・有益性のないこともまた認めざるをえないのである。特に、その<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">20</span><span class=\"bl-lab\">ア</span></span>が真実に反するものであつて、他人の<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">17</span><span class=\"bl-lab\">イ</span></span>としての名誉を侵害・毀損する場合においては、<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">17</span><span class=\"bl-lab\">イ</span></span>の保護の観点からも、この点の考慮が要請されるわけである。私は、その限界は以下のところにあると考える。すなわち、表現の事前規制は、事後規制の場合に比して格段の慎重さが求められるのであり、名誉の侵害・毀損の被害者が公務員、公選による公職の候補者等の<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">9</span><span class=\"bl-lab\">ウ</span></span>人物であつて、その<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">20</span><span class=\"bl-lab\">ア</span></span>が<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">9</span><span class=\"bl-lab\">ウ</span></span>問題に関する場合には、表現にかかる事実が真実に反していてもたやすく規制の対象とすべきではない。しかし、その表現行為がいわゆる<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">19</span><span class=\"bl-lab\">エ</span></span>をもつてされた場合、換言すれば、表現にかかる事実が真実に反し虚偽であることを知りながらその行為に及んだとき又は虚偽であるか否かを無謀にも無視して表現行為に踏み切つた場合には、表現の自由の優越的保障は後退し、その保護を主張しえないものと考える。けだし、右の場合には、故意に虚偽の情報を流すか、<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">20</span><span class=\"bl-lab\">ア</span></span>の真実性に無関心であつたものというべく、表現の自由の優越を保障した憲法二一条の根拠に鑑み、かかる表現行為を保護する必要性・有益性はないと考えられるからである。<br>（最大判昭和61年6月11日民集40巻4号872頁・裁判官谷口正孝の補足意見）", "blanks": [{"label": "ア", "answer": "20"}, {"label": "イ", "answer": "17"}, {"label": "ウ", "answer": "9"}, {"label": "エ", "answer": "19"}], "choices": [{"num": 1, "text": "差別的表現"}, {"num": 2, "text": "不公正な論評"}, {"num": 3, "text": "私的領域"}, {"num": 4, "text": "相当な誤信"}, {"num": 5, "text": "公益的"}, {"num": 6, "text": "社会的"}, {"num": 7, "text": "人物評価"}, {"num": 8, "text": "自己決定権"}, {"num": 9, "text": "公的"}, {"num": 10, "text": "誹謗中傷"}, {"num": 11, "text": "表現手段"}, {"num": 12, "text": "ダブル・スタンダード"}, {"num": 13, "text": "公的領域"}, {"num": 14, "text": "公知の"}, {"num": 15, "text": "自己実現"}, {"num": 16, "text": "明白かつ現在の危険"}, {"num": 17, "text": "人格権"}, {"num": 18, "text": "論争的"}, {"num": 19, "text": "現実の悪意"}, {"num": 20, "text": "表現内容"}]}, {"source": "平成29年（2017年）問42", "year": "平成29年", "seireki": 2017, "qnum": 42, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "questionHtml": "行政機関は、多くの場合、自らその活動のための基準を設定する。この種の設定行為および設定された基準は、通例、<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">6</span><span class=\"bl-lab\">ア</span></span>と呼ばれる。この<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">6</span><span class=\"bl-lab\">ア</span></span>には、行政法学上で<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">9</span><span class=\"bl-lab\">イ</span></span>と<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">3</span><span class=\"bl-lab\">ウ</span></span>と呼ばれる2種類の規範が含まれる。前者が法的拘束力を持つのに対し後者はこれを持たないものとして区別されている。<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">13</span><span class=\"bl-lab\">エ</span></span>は、行政機関が意思決定や事実を公に知らせる形式であるが、<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">6</span><span class=\"bl-lab\">ア</span></span>の一種として用いられることがある。この場合、それが<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">9</span><span class=\"bl-lab\">イ</span></span>に当たるのかそれとも<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">3</span><span class=\"bl-lab\">ウ</span></span>に当たるのかがしばしば問題とされてきた。例えば、文部科学大臣の<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">13</span><span class=\"bl-lab\">エ</span></span>である学習指導要領を<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">9</span><span class=\"bl-lab\">イ</span></span>だと解する見解によれば、学習指導要領には法的拘束力が認められるのに対し、学習指導要領は単なる指導助言文書だと解する見解によれば、そのような法的拘束力は認められないことになる。また、<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">13</span><span class=\"bl-lab\">エ</span></span>のうち、政策的な目標や指針と解される定めは、<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">3</span><span class=\"bl-lab\">ウ</span></span>と位置付けられることになろう。以上のように、<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">13</span><span class=\"bl-lab\">エ</span></span>の法的性質については一律に確定することができず、個別に判断する必要がある。", "blanks": [{"label": "ア", "answer": "6"}, {"label": "イ", "answer": "9"}, {"label": "ウ", "answer": "3"}, {"label": "エ", "answer": "13"}], "choices": [{"num": 1, "text": "行政指導指針"}, {"num": 2, "text": "行政処分"}, {"num": 3, "text": "行政規則"}, {"num": 4, "text": "施行規則"}, {"num": 5, "text": "定款"}, {"num": 6, "text": "行政立法"}, {"num": 7, "text": "処分基準"}, {"num": 8, "text": "解釈基準"}, {"num": 9, "text": "法規命令"}, {"num": 10, "text": "職務命令"}, {"num": 11, "text": "政令"}, {"num": 12, "text": "省令"}, {"num": 13, "text": "告示"}, {"num": 14, "text": "訓令"}, {"num": 15, "text": "通達"}, {"num": 16, "text": "審査基準"}, {"num": 17, "text": "委任命令"}, {"num": 18, "text": "附款"}, {"num": 19, "text": "裁量基準"}, {"num": 20, "text": "執行命令"}]}, {"source": "平成29年（2017年）問43", "year": "平成29年", "seireki": 2017, "qnum": 43, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "questionHtml": "行政救済制度としては、違法な行政行為の効力を争いその取消し等を求めるものとして行政上の不服申立手続及び抗告訴訟があり、違法な公権力の行使の結果生じた損害をてん補するものとして・・・<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">11</span><span class=\"bl-lab\">ア</span></span>請求がある。両者はその目的・要件・効果を異にしており、別個独立の手段として、あいまって行政救済を完全なものとしていると理解することができる。後者は、憲法17条を淵源とする制度であって歴史的意義を有し、被害者を実効的に救済する機能のみならず制裁的機能及び将来の違法行為を抑止するという機能を有している。このように公務員の不法行為について国又は公共団体が・・・責任を負うという憲法上の原則及び<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">11</span><span class=\"bl-lab\">ア</span></span>請求が果たすべき機能をも考えると、違法な行政処分により被った損害について<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">11</span><span class=\"bl-lab\">ア</span></span>請求をするに際しては、あらかじめ当該行政処分についての取消し又は<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">6</span><span class=\"bl-lab\">イ</span></span>確認の判決を得なければならないものではないというべきである。この理は、金銭の徴収や給付を目的とする行政処分についても同じであって、これらについてのみ、法律関係を早期に安定させる利益を優先させなければならないという理由はない。原審は、・・・固定資産税等の賦課決定のような行政処分については、過納金相当額を損害とする<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">11</span><span class=\"bl-lab\">ア</span></span>請求を許容すると、実質的に<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">10</span><span class=\"bl-lab\">ウ</span></span>の取消訴訟と同一の効果を生じさせることとなって、<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">10</span><span class=\"bl-lab\">ウ</span></span>等の不服申立方法・期間を制限した趣旨を潜脱することになり、<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">10</span><span class=\"bl-lab\">ウ</span></span>の<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">20</span><span class=\"bl-lab\">エ</span></span>をも否定することになる等として、<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">10</span><span class=\"bl-lab\">ウ</span></span>に<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">6</span><span class=\"bl-lab\">イ</span></span>原因がない場合は、それが適法に取り消されない限り、<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">11</span><span class=\"bl-lab\">ア</span></span>請求をすることは許されないとしている。しかしながら、効果を同じくするのは<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">10</span><span class=\"bl-lab\">ウ</span></span>が金銭の徴収を目的とする行政処分であるからにすぎず、<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">10</span><span class=\"bl-lab\">ウ</span></span>の<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">20</span><span class=\"bl-lab\">エ</span></span>と整合させるために法律上の根拠なくそのように異なった取扱いをすることは、相当でないと思われる。<br>（最一小判平成22年6月3日民集64巻4号1010頁・裁判官宮川光治の補足意見）", "blanks": [{"label": "ア", "answer": "11"}, {"label": "イ", "answer": "6"}, {"label": "ウ", "answer": "10"}, {"label": "エ", "answer": "20"}], "choices": [{"num": 1, "text": "不当"}, {"num": 2, "text": "損失補償"}, {"num": 3, "text": "授益処分"}, {"num": 4, "text": "撤回"}, {"num": 5, "text": "住民監査"}, {"num": 6, "text": "無効"}, {"num": 7, "text": "執行カ"}, {"num": 8, "text": "強制徴収"}, {"num": 9, "text": "既判力"}, {"num": 10, "text": "課税処分"}, {"num": 11, "text": "国家賠償"}, {"num": 12, "text": "不存在"}, {"num": 13, "text": "取立"}, {"num": 14, "text": "形成力"}, {"num": 15, "text": "差止"}, {"num": 16, "text": "支払"}, {"num": 17, "text": "不作為"}, {"num": 18, "text": "不可変更カ"}, {"num": 19, "text": "通知"}, {"num": 20, "text": "公定力"}]}, {"source": "平成28年（2016年）問41", "year": "平成28年", "seireki": 2016, "qnum": 41, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "questionHtml": "憲法二一条二項前段は、「検閲は、これをしてはならない。」と規定する。憲法が、表現の自由につき、広くこれを保障する旨の一般的規定を同条一項に置きながら、別に検閲の禁止についてかような特別の規定を設けたのは、検閲がその性質上表現の自由に対する最も厳しい制約となるものであることにかんがみ、これについては、公共の福祉を理由とする例外の許容（憲法一二条、一三条参照）をも認めない趣旨を明らかにしたものと解すべきである。けだし、諸外国においても、表現を事前に規制する検閲の制度により思想表現の自由が著しく制限されたという歴史的経験があり、また、わが国においても、旧憲法下における出版法（明治二六年法律第一五号）、新聞紙法（明治四二年法律第四一号）により、文書、図画ないし新聞、雑誌等を出版直前ないし発行時に提出させた上、その発売、頒布を禁止する権限が内務大臣に与えられ、その運用を通じて<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">実質的</span><span class=\"bl-lab\">ア</span></span>な検閲が行われたほか、映画法（昭和一四年法律第六六号）により映画フイルムにつき内務大臣による典型的な検閲が行われる等、思想の自由な発表、交流が妨げられるに至った経験を有するのであって、憲法二一条二項前段の規定は、これらの経験に基づいて、検閲の<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">絶対的禁止</span><span class=\"bl-lab\">イ</span></span>を宣言した趣旨と解されるのである。<br>そして、前記のような沿革に基づき、右の解釈を前提として考究すると、憲法二一条二項にいう「検閲」とは、<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">行政権</span><span class=\"bl-lab\">ウ</span></span>が主体となって、思想内容等の表現物を対象とし、その全部又は一部の発表の禁止を目的として、対象とされる一定の表現物につき<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">網羅的一般的</span><span class=\"bl-lab\">エ</span></span>に、発表前にその内容を審査した上、不適当と認めるものの発表を禁止することを、その特質として備えるものを指すと解すべきである。<br>（最大判昭和59年12月12日民集38巻12号1308頁）", "blanks": [{"label": "ア", "answer": "実質的"}, {"label": "イ", "answer": "絶対的禁止"}, {"label": "ウ", "answer": "行政権"}, {"label": "エ", "answer": "網羅的一般的"}], "choices": [{"num": 1, "text": "行政権"}, {"num": 2, "text": "絶対的禁止"}, {"num": 3, "text": "例外的"}, {"num": 4, "text": "否定的体験"}, {"num": 5, "text": "外形的"}, {"num": 6, "text": "原則的禁止"}, {"num": 7, "text": "形式的"}, {"num": 8, "text": "制限的適用"}, {"num": 9, "text": "抜き打ち的"}, {"num": 10, "text": "積極的廃止"}, {"num": 11, "text": "実質的"}, {"num": 12, "text": "個別的具体的"}, {"num": 13, "text": "警察権"}, {"num": 14, "text": "法律的留保的"}, {"num": 15, "text": "国家"}, {"num": 16, "text": "網羅的一般的"}, {"num": 17, "text": "司法権　18裁量的"}, {"num": 19, "text": "公権力"}, {"num": 20, "text": "排他的"}]}, {"source": "平成28年（2016年）問42", "year": "平成28年", "seireki": 2016, "qnum": 42, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "questionHtml": "<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">行政処分</span><span class=\"bl-lab\">ア</span></span>について<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">事前手続</span><span class=\"bl-lab\">イ</span></span>の規定を設けない立法の合憲性が問われた事件において、最高裁は、次のように述べてこれを合憲と判断した。すなわち、憲法31条による保障は、｢直接には<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">刑事手続</span><span class=\"bl-lab\">ウ</span></span>に関するものであるが、<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">行政手続</span><span class=\"bl-lab\">エ</span></span>については、それが<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">刑事手続</span><span class=\"bl-lab\">ウ</span></span>ではないとの理由のみで、そのすべてが当然に同条による保障の枠外にあると判断することは相当ではない」。「しかしながら、同条による保障が及ぶと解すべき場合であっても、一般に、<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">行政手続</span><span class=\"bl-lab\">エ</span></span>は、<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">刑事手続</span><span class=\"bl-lab\">ウ</span></span>とその性質においておのずから差異があり、また、行政目的に応じて多種多様であるから、<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">行政処分</span><span class=\"bl-lab\">ア</span></span>の相手方に・・・告知、弁解、防御の機会を与えるかどうかは、<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">行政処分</span><span class=\"bl-lab\">ア</span></span>により制限を受ける権利利益の内容、性質、制限の程度、<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">行政処分</span><span class=\"bl-lab\">ア</span></span>により達成しようとする公益の内容、程度、緊急性等を総合較量して決定されるべきものであって、常に必ずそのような機会を与えることを必要とするものではないと解するのが相当である｣。また、この判決に付された意見も、｢<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">行政手続</span><span class=\"bl-lab\">エ</span></span>がそれぞれの行政目的に応じて多種多様である実情に照らせば、・・・<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">行政処分</span><span class=\"bl-lab\">ア</span></span>全般につき・・・告知・聴聞を含む<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">事前手続</span><span class=\"bl-lab\">イ</span></span>を欠くことが直ちに違憲・無効の結論を招来する、と解するのは相当でない｣と述べて、法廷意見の結論を是認した（最大判平成4年7月1日民集46巻5号437頁）。とはいえ、この判決では、<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">行政手続</span><span class=\"bl-lab\">エ</span></span>の重要な一部をなす<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">事前手続</span><span class=\"bl-lab\">イ</span></span>が憲法31条に照らしてどのようなものであるべきかは、示されなかった。", "blanks": [{"label": "ア", "answer": "行政処分"}, {"label": "イ", "answer": "事前手続"}, {"label": "ウ", "answer": "刑事手続"}, {"label": "エ", "answer": "行政手続"}], "choices": [{"num": 1, "text": "立法手続"}, {"num": 2, "text": "行政立法"}, {"num": 3, "text": "行政訴訟"}, {"num": 4, "text": "刑事手続"}, {"num": 5, "text": "行政裁量"}, {"num": 6, "text": "行政手続"}, {"num": 7, "text": "司法権"}, {"num": 8, "text": "営業の自由"}, {"num": 9, "text": "財産権"}, {"num": 10, "text": "基本的人権"}, {"num": 11, "text": "司法手続"}, {"num": 12, "text": "事前手続"}, {"num": 13, "text": "適正手続"}, {"num": 14, "text": "立法権"}, {"num": 15, "text": "行政権"}, {"num": 16, "text": "権利救済"}, {"num": 17, "text": "破壊活動"}, {"num": 18, "text": "人身の自由"}, {"num": 19, "text": "行政処分"}, {"num": 20, "text": "犯罪行為"}]}, {"source": "平成28年（2016年）問43", "year": "平成28年", "seireki": 2016, "qnum": 43, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "questionHtml": "旧行政事件訴訟特例法のもとにおいても、また、行政事件訴訟法のもとにおいても、行政庁の<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">裁量</span><span class=\"bl-lab\">ア</span></span>に任された<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">行政処分</span><span class=\"bl-lab\">イ</span></span>の<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">無効確認</span><span class=\"bl-lab\">ウ</span></span>を求める訴訟においては、その<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">無効確認</span><span class=\"bl-lab\">ウ</span></span>を求める者において、行政庁が、右<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">行政処分</span><span class=\"bl-lab\">イ</span></span>をするにあたってした<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">裁量</span><span class=\"bl-lab\">ア</span></span>権の行使がその範囲をこえまたは濫用にわたり、したがって、右<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">行政処分</span><span class=\"bl-lab\">イ</span></span>が違法であり、かつ、その違法が<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">重大かつ明白</span><span class=\"bl-lab\">エ</span></span>であることを主張および立証することを要するものと解するのが相当である。これを本件についてみるに、本件・・・売渡処分は、旧自作農創設特別措置法四一条一項二号および同法施行規則二八条の八に基づいてなされたものであるから、右売渡処分をするにあたって、右法条に規定されたものの相互の間で、いずれのものを売渡の相手方とするかは、政府の<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">裁量</span><span class=\"bl-lab\">ア</span></span>に任されているものというべきである。しかるに、上告人らは、政府のした右<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">裁量</span><span class=\"bl-lab\">ア</span></span>権の行使がその範囲をこえもしくは濫用にわたり、したがって違法視されるべき旨の具体的事実の主張または右違法が<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">重大かつ明白</span><span class=\"bl-lab\">エ</span></span>である旨の具体的事実の主張のいずれをもしていない・・・。<br>（最二小判昭和42年4月7日民集21巻3号572頁）", "blanks": [{"label": "ア", "answer": "裁量"}, {"label": "イ", "answer": "行政処分"}, {"label": "ウ", "answer": "無効確認"}, {"label": "エ", "answer": "重大かつ明白"}], "choices": [{"num": 1, "text": "命令"}, {"num": 2, "text": "無効確認"}, {"num": 3, "text": "許可"}, {"num": 4, "text": "重大"}, {"num": 5, "text": "監督"}, {"num": 6, "text": "取消し"}, {"num": 7, "text": "承認"}, {"num": 8, "text": "重大かつ明白"}, {"num": 9, "text": "指揮"}, {"num": 10, "text": "行政処分"}, {"num": 11, "text": "明らか"}, {"num": 12, "text": "裁決"}, {"num": 13, "text": "真実"}, {"num": 14, "text": "支給"}, {"num": 15, "text": "明確"}, {"num": 16, "text": "救済"}, {"num": 17, "text": "釈明処分"}, {"num": 18, "text": "審判　19認定"}, {"num": 20, "text": "裁量"}]}, {"source": "平成27年（2015年）問41", "year": "平成27年", "seireki": 2015, "qnum": 41, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "questionHtml": "公立図書館は、住民に対して思想、意見その他の種々の情報を含む図書館資料を提供してその教養を高めること等を目的とする<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">公的な場</span><span class=\"bl-lab\">ア</span></span>ということができる。<br>そして、公立図書館の図書館職員は、公立図書館が上記のような役割を果たせるように、独断的な評価や個人的な好みにとらわれることなく、公正に図書館資料を取り扱うべき<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">職務上の義務</span><span class=\"bl-lab\">イ</span></span>を負うものというべきであり、閲覧に供されている図書について、独断的な評価や個人的な好みによってこれを廃棄することは、図書館職員としての基本的な<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">職務上の義務</span><span class=\"bl-lab\">イ</span></span>に反するものといわなければならない。<br>他方、公立図書館が、上記のとおり、住民に図書館資料を提供するための<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">公的な場</span><span class=\"bl-lab\">ア</span></span>であるということは、そこで閲覧に供された図書の<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">著作者</span><span class=\"bl-lab\">ウ</span></span>にとって、その思想、意見等を<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">公衆に伝達</span><span class=\"bl-lab\">エ</span></span>する<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">公的な場</span><span class=\"bl-lab\">ア</span></span>でもあるということができる。<br>したがって、公立図書館の図書館職員が閲覧に供されている図書を<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">著作者</span><span class=\"bl-lab\">ウ</span></span>の思想や信条を理由とするなど不公正な取扱いによって廃棄することは、当該<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">著作者</span><span class=\"bl-lab\">ウ</span></span>が著作物によってその思想、意見等を<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">公衆に伝達</span><span class=\"bl-lab\">エ</span></span>する利益を不当に損なうものといわなければならない。<br>そして、<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">著作者</span><span class=\"bl-lab\">ウ</span></span>の思想の自由、表現の自由が憲法により保障された基本的人権であることにもかんがみると、公立図書館において、その著作物が閲覧に供されている<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">著作者</span><span class=\"bl-lab\">ウ</span></span>が有する上記利益は、法的保護に値する人格的利益であると解するのが相当であり、公立図書館の図書館職員である公務員が、図書の廃棄について、基本的な<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">職務上の義務</span><span class=\"bl-lab\">イ</span></span>に反し、<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">著作者</span><span class=\"bl-lab\">ウ</span></span>又は著作物に対する独断的な評価や個人的な好みによって不公正な取扱いをしたときは、当該図書の<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">著作者</span><span class=\"bl-lab\">ウ</span></span>の上記人格的利益を侵害するものとして国家賠償法上違法となるというべきである。<br>（最判平成17年7月14日民集59巻6号1569頁）", "blanks": [{"label": "ア", "answer": "公的な場"}, {"label": "イ", "answer": "職務上の義務"}, {"label": "ウ", "answer": "著作者"}, {"label": "エ", "answer": "公衆に伝達"}], "choices": [{"num": 1, "text": "読者"}, {"num": 2, "text": "客観的良心"}, {"num": 3, "text": "制度的保障"}, {"num": 4, "text": "公衆に伝達"}, {"num": 5, "text": "道義上の責務"}, {"num": 6, "text": "啓発施設"}, {"num": 7, "text": "政治倫理"}, {"num": 8, "text": "出版者"}, {"num": 9, "text": "利用者"}, {"num": 10, "text": "学習施設"}, {"num": 11, "text": "研究者"}, {"num": 12, "text": "世論に訴求"}, {"num": 13, "text": "職務上の義務"}, {"num": 14, "text": "図書館の自由"}, {"num": 15, "text": "著作者"}, {"num": 16, "text": "有効に批判"}, {"num": 17, "text": "教育の場"}, {"num": 18, "text": "無料で収集"}, {"num": 19, "text": "公的な場"}, {"num": 20, "text": "広汎に流通"}]}, {"source": "平成27年（2015年）問42", "year": "平成27年", "seireki": 2015, "qnum": 42, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "questionHtml": "<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">行政指導</span><span class=\"bl-lab\">ア</span></span>は、<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">処分</span><span class=\"bl-lab\">イ</span></span>ではないから、抗告訴訟はもちろん、行政不服審査法による審査請求の対象ともならないとされてきた。しかし、<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">行政指導</span><span class=\"bl-lab\">ア</span></span>についても、これに従わない場合について、<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">公表</span><span class=\"bl-lab\">ウ</span></span>が定められている例があるなど、相手方の権利利益に大きな影響を及ぼすものが少なくない。そこで、行政手続法が改正され、<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">法律</span><span class=\"bl-lab\">エ</span></span>に根拠を有する<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">行政指導</span><span class=\"bl-lab\">ア</span></span>のうち、違法行為の是正を求めるものについては、それが<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">法律</span><span class=\"bl-lab\">エ</span></span>に定める要件に適合しないと思料する相手方は、行政機関にその中止等を求めることができるとされた。この申出があったときは、行政機関は、必要な調査を行い、それが要件に適合しないと認められるときは、その<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">行政指導</span><span class=\"bl-lab\">ア</span></span>の中止その他必要な措置をとるべきこととされた。もし、<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">公表</span><span class=\"bl-lab\">ウ</span></span>がなされていれば、必要な措置として、それも中止しなければならないこととなる。また、これと並んで、違法行為の是正のための<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">処分</span><span class=\"bl-lab\">イ</span></span>や<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">行政指導</span><span class=\"bl-lab\">ア</span></span>がなされていないと思料する者は、これらをすることを求めることができる旨の規定も置かれている。", "blanks": [{"label": "ア", "answer": "行政指導"}, {"label": "イ", "answer": "処分"}, {"label": "ウ", "answer": "公表"}, {"label": "エ", "answer": "法律"}], "choices": [{"num": 1, "text": "即時強制"}, {"num": 2, "text": "命令"}, {"num": 3, "text": "刑事処罰"}, {"num": 4, "text": "過料の徴収"}, {"num": 5, "text": "代執行"}, {"num": 6, "text": "行政調査"}, {"num": 7, "text": "法律"}, {"num": 8, "text": "法規命令"}, {"num": 9, "text": "行政指導"}, {"num": 10, "text": "強制執行"}, {"num": 11, "text": "契約"}, {"num": 12, "text": "強制"}, {"num": 13, "text": "処分"}, {"num": 14, "text": "不作為"}, {"num": 15, "text": "処分基準"}, {"num": 16, "text": "条例"}, {"num": 17, "text": "公表"}, {"num": 18, "text": "要綱"}, {"num": 19, "text": "規則"}, {"num": 20, "text": "実力行使"}]}, {"source": "平成27年（2015年）問43", "year": "平成27年", "seireki": 2015, "qnum": 43, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "questionHtml": "建築確認申請に係る建築物の建築計画をめぐり建築主と付近住民との間に紛争が生じ、関係地方公共団体により建築主に対し、付近住民と話合いを行って円満に紛争を解決するようにとの内容の行政指導が行われ、建築主において<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">任意</span><span class=\"bl-lab\">ア</span></span>に右行政指導に応じて付近住民と協議をしている場合においても、そのことから常に当然に建築主が建築主事に対し確認処分を<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">留保</span><span class=\"bl-lab\">イ</span></span>することについてまで<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">任意</span><span class=\"bl-lab\">ア</span></span>に同意をしているものとみるのは相当でない。しかしながら、･･･関係地方公共団体において、当該建築確認申請に係る建築物が建築計画どおりに建築されると付近住民に対し少なからぬ日照阻害、風害等の被害を及ぼし、良好な居住環境あるいは市街環境を損なうことになるものと考えて、当該地域の生活環境の維持、向上を図るために、建築主に対し、当該建築物の建築計画につき一定の譲歩・協力を求める行政指導を行い、建築主が<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">任意</span><span class=\"bl-lab\">ア</span></span>にこれに応じているものと認められる場合においては、<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">社会通念</span><span class=\"bl-lab\">ウ</span></span>上合理的と認められる期間建築主事が申請に係る建築計画に対する確認処分を<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">留保</span><span class=\"bl-lab\">イ</span></span>し、行政指導の結果に期待することがあつたとしても、これをもつて直ちに違法な措置であるとまではいえないというべきである。<br>もつとも、右のような確認処分の<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">留保</span><span class=\"bl-lab\">イ</span></span>は、建築主の<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">任意</span><span class=\"bl-lab\">ア</span></span>の協力・服従のもとに行政指導が行われていることに基づく事実上の措置にとどまるものであるから、建築主において自己の申請に対する確認処分を<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">留保</span><span class=\"bl-lab\">イ</span></span>されたままでの行政指導には応じられないとの意思を明確に表明している場合には、かかる建築主の明示の意思に反してその受忍を強いることは許されない筋合のものであるといわなければならず、建築主が右のような行政指導に不協力・不服従の意思を表明している場合には、当該建築主が受ける不利益と右行政指導の目的とする公益上の必要性とを比較衡量して、右行政指導に対する建築主の不協力が<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">社会通念</span><span class=\"bl-lab\">ウ</span></span>上正義の観念に反するものといえるような<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">特段の事情</span><span class=\"bl-lab\">エ</span></span>が存在しない限り、行政指導が行われているとの理由だけで確認処分を<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">留保</span><span class=\"bl-lab\">イ</span></span>することは、違法である
