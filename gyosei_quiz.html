 "text": "通信の秘密"}, {"num": 20, "text": "行政処分"}]}, {"source": "平成24年（2012年）問41", "year": "平成24年", "seireki": 2012, "qnum": 41, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "questionHtml": "一の見解は、子どもの教育は、親を含む国民全体の共通関心事であり、公教育制度は、このような国民の期待と要求に応じて形成、実施されるものであつて、そこにおいて支配し、実現されるべきものは国民全体の教育意思であるが、この国民全体の教育意思は、憲法の採用する議会制民主主義の下においては、国民全体の意思の決定の唯一のルートである国会の法律制定を通じて具体化されるべきものであるから、法律は、当然に、公教育における<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">10</span><span class=\"bl-lab\">ア</span></span>についても包活的にこれを定めることができ、また、教育行政機関も、法律の授権に基づく限り、広くこれらの事項について決定権限を有する、と主張する。これに対し、他の見解は、子どもの教育は、憲法二六条の保障する子どもの教育を受ける権利に対する責務として行われるべきもので、このような責務をになう者は、親を中心とする国民全体であり、公教育としての子どもの教育は、いわば親の教育義務の共同化ともいうべき性格をもつのであつて、それ故にまた、教基法（※）一〇条一項も、教育は、国民全体の信託の下に、これに対して直接に責任を負うように行われなければならないとしている、　したがつて、権力主体としての国の子どもの教育に対するかかわり合いは、右のような国民の教育義務の遂行を側面から助成するための<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">3</span><span class=\"bl-lab\">イ</span></span>に限られ、子どもの<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">10</span><span class=\"bl-lab\">ア</span></span>については、国は原則として介入権能をもたず、教育は、その実施にあたる教師が、その<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">9</span><span class=\"bl-lab\">ウ</span></span>としての立場から、国民全体に対して教育的、文化的責任を負うような形で、・・・決定、遂行すべきものであり、このことはまた、憲法二三条における学問の自由の保障が、学問研究の自由ばかりでなく、<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">4</span><span class=\"bl-lab\">エ</span></span>をも含み、<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">4</span><span class=\"bl-lab\">エ</span></span>は、教育の本質上、高等教育のみならず、普通教育におけるそれにも及ぶと解すべきことによつても裏付けられる、と主張するのである。<br>（最大判昭和51年5月21日刑集30巻5号615頁）<br>（注）※教育基本法", "blanks": [{"label": "ア", "answer": "10"}, {"label": "イ", "answer": "3"}, {"label": "ウ", "answer": "9"}, {"label": "エ", "answer": "4"}], "choices": [{"num": 1, "text": "初等教育"}, {"num": 2, "text": "教科書検定"}, {"num": 3, "text": "諸条件の整備"}, {"num": 4, "text": "教授の自由"}, {"num": 5, "text": "教育公務員"}, {"num": 6, "text": "第三者"}, {"num": 7, "text": "教科用図書"}, {"num": 8, "text": "学習指導要領"}, {"num": 9, "text": "教育専門家"}, {"num": 10, "text": "教育の内容及び方法"}, {"num": 11, "text": "研究者"}, {"num": 12, "text": "管理者"}, {"num": 13, "text": "中等教育"}, {"num": 14, "text": "学習権"}, {"num": 15, "text": "懲戒権"}, {"num": 16, "text": "私立学校の自治"}, {"num": 17, "text": "大学の自治"}, {"num": 18, "text": "公の支配"}, {"num": 19, "text": "職務命令"}, {"num": 20, "text": "指揮監督"}]}, {"source": "平成24年（2012年）問42", "year": "平成24年", "seireki": 2012, "qnum": 42, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "questionHtml": "本件<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">19</span><span class=\"bl-lab\">ア</span></span>は、・・・学習指導要領を踏まえ、上級行政機関である都教委（※）が関係下級行政機関である都立学校の各校長を名宛人としてその職務権限の行使を指揮するために発出したものであって、個々の教職員を名宛人とするものではなく、本件<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">8</span><span class=\"bl-lab\">イ</span></span>の発出を待たずに当該<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">19</span><span class=\"bl-lab\">ア</span></span>自体によって個々の教職員に具体的な義務を課すものではない。また、本件<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">19</span><span class=\"bl-lab\">ア</span></span>には、・・・各校長に対し、本件<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">8</span><span class=\"bl-lab\">イ</span></span>の発出の必要性を基礎付ける事項を示すとともに、教職員がこれに従わない場合は服務上の責任を問われることの周知を命ずる旨の文言があり、これらは国歌斉唱の際の起立斉唱又はピアノ伴奏の実施が必要に応じて<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">8</span><span class=\"bl-lab\">イ</span></span>により確保されるべきことを前提とする趣旨と解されるものの、本件<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">8</span><span class=\"bl-lab\">イ</span></span>の発出を命ずる旨及びその範囲等を示す文言は含まれておらず、具体的にどの範囲の教職員に対し本件<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">8</span><span class=\"bl-lab\">イ</span></span>を発するか等については個々の式典及び教職員ごとの個別的な事情に応じて各校長の<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">17</span><span class=\"bl-lab\">ウ</span></span>に委ねられているものと解される。そして、本件<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">19</span><span class=\"bl-lab\">ア</span></span>では、上記のとおり、本件<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">8</span><span class=\"bl-lab\">イ</span></span>の違反について教職員の責任を問う方法も、<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">11</span><span class=\"bl-lab\">エ</span></span>に限定されておらず、訓告や注意等も含み得る表現が採られており、具体的にどのような問責の方法を採るかは個々の教職員ごとの個別的な事情に応じて都教委の<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">17</span><span class=\"bl-lab\">ウ</span></span>によることが前提とされているものと解される。原審の指摘する都教委の校長連絡会等を通じての各校長への指導の内容等を勘案しても、本件<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">19</span><span class=\"bl-lab\">ア</span></span>それ自体の文言や性質等に則したこれらの<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">17</span><span class=\"bl-lab\">ウ</span></span>の存在が否定されるものとは解されない。したがって、本件<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">19</span><span class=\"bl-lab\">ア</span></span>をもって、本件<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">8</span><span class=\"bl-lab\">イ</span></span>と不可分一体のものとしてこれと同視することはできず、本件<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">8</span><span class=\"bl-lab\">イ</span></span>を受ける教職員に条件付きで<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">11</span><span class=\"bl-lab\">エ</span></span>を受けるという法的効果を生じさせるものとみることもできない。<br>（最一小判平成24年2月9日裁判所時報1549号4頁）<br>（注）※東京都教育委員会", "blanks": [{"label": "ア", "answer": "19"}, {"label": "イ", "answer": "8"}, {"label": "ウ", "answer": "17"}, {"label": "エ", "answer": "11"}], "choices": [{"num": 1, "text": "分限処分"}, {"num": 2, "text": "処分基準"}, {"num": 3, "text": "行政罰"}, {"num": 4, "text": "同意"}, {"num": 5, "text": "行政指導"}, {"num": 6, "text": "指示"}, {"num": 7, "text": "法規命令"}, {"num": 8, "text": "職務命令"}, {"num": 9, "text": "指導指針"}, {"num": 10, "text": "下命"}, {"num": 11, "text": "懲戒処分"}, {"num": 12, "text": "監督処分"}, {"num": 13, "text": "政治的判断"}, {"num": 14, "text": "執行命令"}, {"num": 15, "text": "告示"}, {"num": 16, "text": "審査基準"}, {"num": 17, "text": "裁量"}, {"num": 18, "text": "勧告"}, {"num": 19, "text": "通達"}, {"num": 20, "text": "行政規則"}]}, {"source": "平成24年（2012年）問43", "year": "平成24年", "seireki": 2012, "qnum": 43, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "questionHtml": "関連リンク<br>平成24年の他の問題一覧<br><span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">行政組織］法のとる制定法上の［</span><span class=\"bl-lab\">ア</span></span>法上の基礎概念である<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">行政機関］概念であって</span><span class=\"bl-lab\">イ</span></span>は、大きく二つの類型に分類して理解されている。一つは、行政主体とその外部との関係を基準として捉える作用法的<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">行政機関］概念であって</span><span class=\"bl-lab\">イ</span></span>概念である。例えば、行政処分を行う<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">行政庁］と［</span><span class=\"bl-lab\">ウ</span></span>がその権限に属する事務の一部をその<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">補助機関］という区分は</span><span class=\"bl-lab\">エ</span></span>である職員に委任し、またはこれに臨時に代理させて、私人に対する権限行使を行うような場合、この<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">行政庁］と［</span><span class=\"bl-lab\">ウ</span></span>と<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">補助機関］という区分は</span><span class=\"bl-lab\">エ</span></span>という区分は、上記の作用法的<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">行政機関］概念であって</span><span class=\"bl-lab\">イ</span></span>概念に基づくものである。もう一つは、各々の<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">行政機関］概念であって</span><span class=\"bl-lab\">イ</span></span>が担当する事務を単位として捉える事務配分的<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">行政機関］概念であって</span><span class=\"bl-lab\">イ</span></span>概念である。この概念は、現行法制の下では、国家<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">行政組織］法のとる制定法上の［</span><span class=\"bl-lab\">ア</span></span>法のとる制定法上の<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">行政機関］概念であって</span><span class=\"bl-lab\">イ</span></span>概念であって、行政事務を外部関係・内部関係に区分することなく全体として把握するとともに、さまざまな行政の行為形式を現実に即して理解するために適している。", "blanks": [{"label": "ア", "answer": "行政組織］法のとる制定法上の［"}, {"label": "イ", "answer": "行政機関］概念であって"}, {"label": "ウ", "answer": "行政庁］と［"}, {"label": "エ", "answer": "補助機関］という区分は"}], "choices": [{"num": 1, "text": "行政指導"}, {"num": 2, "text": "行政訴訟"}, {"num": 3, "text": "損失補償"}, {"num": 4, "text": "公務員"}, {"num": 5, "text": "行政委員会"}, {"num": 6, "text": "諮問機関"}, {"num": 7, "text": "責任者"}, {"num": 8, "text": "賠償"}, {"num": 9, "text": "警察"}, {"num": 10, "text": "行政庁"}, {"num": 11, "text": "行政代執行"}, {"num": 12, "text": "土地収用"}, {"num": 13, "text": "内閣"}, {"num": 14, "text": "行政手続"}, {"num": 15, "text": "補助機関"}, {"num": 16, "text": "行政機関"}, {"num": 17, "text": "参与機関"}, {"num": 18, "text": "行政救済"}, {"num": 19, "text": "行政組織"}, {"num": 20, "text": "法治主義"}]}, {"source": "平成23年（2011年）問41", "year": "平成23年", "seireki": 2011, "qnum": 41, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "questionHtml": "ある主張や意見を社会に伝達する自由を保障する場合に、その表現の<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">19</span><span class=\"bl-lab\">ア</span></span>を確保することが重要な意味をもっている。特に表現の自由の行使が行動を伴うときには表現の<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">19</span><span class=\"bl-lab\">ア</span></span>が必要となってくる。表現の<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">19</span><span class=\"bl-lab\">ア</span></span>が提供されないときには、多くの意見は受け手に伝達することができないといってもよい。<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">5</span><span class=\"bl-lab\">イ</span></span>が自由に出入りできる<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">19</span><span class=\"bl-lab\">ア</span></span>は、それぞれその本来の利用目的を備えているが、それは同時に表現の<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">19</span><span class=\"bl-lab\">ア</span></span>として役立つことが少なくない。道路、公園、広場などは、その例である。これを<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">11</span><span class=\"bl-lab\">ウ</span></span>と呼ぶことができよう。この<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">11</span><span class=\"bl-lab\">ウ</span></span>が表現の<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">19</span><span class=\"bl-lab\">ア</span></span>として用いられるときには、<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">16</span><span class=\"bl-lab\">エ</span></span>に基づく制約を受けざるをえないとしても、その機能にかんがみ、表現の自由の保障を可能な限り配慮する必要があると考えられる。<br>もとより、道路のような公共用物と、<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">5</span><span class=\"bl-lab\">イ</span></span>が自由に出入りすることのできる<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">19</span><span class=\"bl-lab\">ア</span></span>とはいえ、私的な<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">16</span><span class=\"bl-lab\">エ</span></span>に服するところとは、性質に差異があり、同一に論ずることはできない。しかし、後者にあっても、<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">11</span><span class=\"bl-lab\">ウ</span></span>たる性質を帯有するときには、表現の自由の保障を無視することができないのであり、その場合には、それぞれの具体的状況に応じて、表現の自由と<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">16</span><span class=\"bl-lab\">エ</span></span>とをどのように調整するかを判断すべきこととなり、前述の較量の結果、表現行為を規制することが表現の自由の保障に照らして是認できないとされる場合がありうるのである。（最三小判昭和59年12月18日刑集38巻12号3026頁以下に付された伊藤正己裁判官の補足意見をもとに作成した）", "blanks": [{"label": "ア", "answer": "19"}, {"label": "イ", "answer": "5"}, {"label": "ウ", "answer": "11"}, {"label": "エ", "answer": "16"}], "choices": [{"num": 1, "text": "手段"}, {"num": 2, "text": "とらわれの聴衆"}, {"num": 3, "text": "ガバメント・スピーチ"}, {"num": 4, "text": "時間"}, {"num": 5, "text": "一般公衆"}, {"num": 6, "text": "プライバシー"}, {"num": 7, "text": "公共の福祉"}, {"num": 8, "text": "敵対的聴衆"}, {"num": 9, "text": "フェア・コメント"}, {"num": 10, "text": "デモ参加者"}, {"num": 11, "text": "パブリック・フォーラム"}, {"num": 12, "text": "内容"}, {"num": 13, "text": "警察官"}, {"num": 14, "text": "思想の自由市場"}, {"num": 15, "text": "方法論"}, {"num": 16, "text": "管理権"}, {"num": 17, "text": "権力関係"}, {"num": 18, "text": "社会的権力"}, {"num": 19, "text": "場"}, {"num": 20, "text": "現実的悪意の法理"}]}, {"source": "平成23年（2011年）問42", "year": "平成23年", "seireki": 2011, "qnum": 42, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "questionHtml": "・・・課税処分につき<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">5</span><span class=\"bl-lab\">ア</span></span>の場合を認めるとしても、このような処分については、・・・<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">12</span><span class=\"bl-lab\">イ</span></span>の制限を受けることなく、何時まででも争うことができることとなるわけであるから、更正についての期間の制限等を考慮すれば、かかる例外の場合を肯定するについて慎重でなければならないことは当然であるが、一般に、課税処分が課税庁と被課税者との間にのみ存するもので、処分の存在を信頼する<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">9</span><span class=\"bl-lab\">ウ</span></span>の保護を考慮する必要のないこと等を勘案すれば、当該処分における内容上の過誤が課税要件の根幹についてのそれであって、徴税行政の安定とその円滑な運営の要請を斟酌してもなお、不服申立期間の徒過による<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">16</span><span class=\"bl-lab\">エ</span></span>的効果の発生を理由として被課税者に右処分による不利益を甘受させることが、著しく不当と認められるような例外的な事情のある場合には、前記の過誤による瑕疵は、当該処分を<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">5</span><span class=\"bl-lab\">ア</span></span>ならしめるものと解するのが相当である。<br>（最一小判昭和48年4月26日民集27巻3号629頁以下）", "blanks": [{"label": "ア", "answer": "5"}, {"label": "イ", "answer": "12"}, {"label": "ウ", "answer": "9"}, {"label": "エ", "answer": "16"}], "choices": [{"num": 1, "text": "審査庁"}, {"num": 2, "text": "違法"}, {"num": 3, "text": "除斥期間"}, {"num": 4, "text": "確定"}, {"num": 5, "text": "当然無効"}, {"num": 6, "text": "裁量"}, {"num": 7, "text": "納税者"}, {"num": 8, "text": "失効"}, {"num": 9, "text": "第三者"}, {"num": 10, "text": "遡及"}, {"num": 11, "text": "裁定"}, {"num": 12, "text": "出訴期間"}, {"num": 13, "text": "消滅"}, {"num": 14, "text": "失権"}, {"num": 15, "text": "時効"}, {"num": 16, "text": "不可争"}, {"num": 17, "text": "取消し"}, {"num": 18, "text": "公益"}, {"num": 19, "text": "公権"}, {"num": 20, "text": "不法"}]}, {"source": "平成23年（2011年）問43", "year": "平成23年", "seireki": 2011, "qnum": 43, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "questionHtml": "行政と私人との間の法的紛争が訴訟となるのは、行政が何かを行った作為の場合だけではなく、何も行わない不作為の場合もありうる。このような行政の不作為についてどのような訴訟で私人が救済を求めるかは、行政救済法の領域における大きな問題である。<br>行政事件訴訟法の定める抗告訴訟の中で、同法の制定当初からこの不作為に対する訴訟類型として存在したのは、行政庁が法令に基づく申請に対し、<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">6</span><span class=\"bl-lab\">ア</span></span>に何らかの処分又は裁決をすべきであるにかかわらず、これをしないことについての違法の確認を求める「不作為の違法確認の訴え」であった。しかしこの訴訟類型は、申請に対して何らかの処分をすることを促すにとどまる消極的なものであるため、救済手段としての効果は限定されたものであった。そこで、平成16年の行政事件訴訟法の改正によって、このような場合について、<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">12</span><span class=\"bl-lab\">イ</span></span>訴訟の提起を認め、またその<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">12</span><span class=\"bl-lab\">イ</span></span>訴訟にかかる処分又は裁決がされないことにより生ずる<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">15</span><span class=\"bl-lab\">ウ</span></span>を避けるため緊急の必要があり、かつ、<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">16</span><span class=\"bl-lab\">エ</span></span>について理由があるとみえるときは、仮の<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">12</span><span class=\"bl-lab\">イ</span></span>による救済が可能となった。またこのほか、この改正によって、申請に対する処分以外の処分についても<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">12</span><span class=\"bl-lab\">イ</span></span>訴訟を提起することができることになった。", "blanks": [{"label": "ア", "answer": "6"}, {"label": "イ", "answer": "12"}, {"label": "ウ", "answer": "15"}, {"label": "エ", "answer": "16"}], "choices": [{"num": 1, "text": "併合提起された訴訟"}, {"num": 2, "text": "速やか"}, {"num": 3, "text": "救済の必要"}, {"num": 4, "text": "差止め"}, {"num": 5, "text": "義務存在確認"}, {"num": 6, "text": "相当の期間内"}, {"num": 7, "text": "職務執行命令"}, {"num": 8, "text": "公の利益に対する障害"}, {"num": 9, "text": "公益上の必要"}, {"num": 10, "text": "代執行"}, {"num": 11, "text": "重大な損害"}, {"num": 12, "text": "義務付け"}, {"num": 13, "text": "回復困難な損害"}, {"num": 14, "text": "迅速"}, {"num": 15, "text": "償うことのできない損害"}, {"num": 16, "text": "本案"}, {"num": 17, "text": "標準処理期間内"}, {"num": 18, "text": "訴えの利益の消滅"}, {"num": 19, "text": "手続の執行"}, {"num": 20, "text": "合理的な期間内"}]}, {"source": "平成22年（2010年）問41", "year": "平成22年", "seireki": 2010, "qnum": 41, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "questionHtml": "・・・憲法以下の法令相互の効力関係を定めることも、憲法のなすべき事項の範囲に属する。憲法は、<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">18</span><span class=\"bl-lab\">ア</span></span>・<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">9</span><span class=\"bl-lab\">イ</span></span>などの制定権をそれぞれ特別の<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">7</span><span class=\"bl-lab\">ウ</span></span>に授権すると同時に、それらの法令の効力関係をも定めなければならない。明治憲法には、<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">18</span><span class=\"bl-lab\">ア</span></span>と<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">9</span><span class=\"bl-lab\">イ</span></span>との効力関係について、第九条但書に、「<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">9</span><span class=\"bl-lab\">イ</span></span>ヲ以テ<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">18</span><span class=\"bl-lab\">ア</span></span>ヲ変更スルコトヲ得ス」とあり、第八条に、緊急<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">9</span><span class=\"bl-lab\">イ</span></span>は、<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">18</span><span class=\"bl-lab\">ア</span></span>に代わる効力をもつ旨を示す規定があった。日本国憲法には、そのような明文の規定はない。政令と<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">18</span><span class=\"bl-lab\">ア</span></span>、最高裁判所規則と<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">18</span><span class=\"bl-lab\">ア</span></span>、地方公共団体の条例と<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">18</span><span class=\"bl-lab\">ア</span></span>・<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">9</span><span class=\"bl-lab\">イ</span></span>など、個々の場合について、憲法の趣旨を考えてみるより仕方がない。例えば、政令と<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">18</span><span class=\"bl-lab\">ア</span></span>との関係においては、憲法は、<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">13</span><span class=\"bl-lab\">エ</span></span>を唯一の立法<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">7</span><span class=\"bl-lab\">ウ</span></span>とし、また、政令としては、<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">18</span><span class=\"bl-lab\">ア</span></span>の規定を実施するための政令、いわゆる執行<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">9</span><span class=\"bl-lab\">イ</span></span>的政令と、<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">18</span><span class=\"bl-lab\">ア</span></span>の委任にもとづく政令・いわゆる委任<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">9</span><span class=\"bl-lab\">イ</span></span>的政令としか認めていないから、一般に政令の効力は<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">18</span><span class=\"bl-lab\">ア</span></span>に劣るとしているものと解せられ、最高裁判所規則と<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">18</span><span class=\"bl-lab\">ア</span></span>との関係においては、憲法は、国民の代表<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">7</span><span class=\"bl-lab\">ウ</span></span>であり、国権の最高<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">7</span><span class=\"bl-lab\">ウ</span></span>、かつ、唯一の立法<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">7</span><span class=\"bl-lab\">ウ</span></span>である<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">13</span><span class=\"bl-lab\">エ</span></span>の立法として、憲法に次ぐ形式的効力を与えている<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">18</span><span class=\"bl-lab\">ア</span></span>に優位を認めているものと解せられる。<br>（出典清宮四郎「憲法I〔第3版〕」より）", "blanks": [{"label": "ア", "answer": "18"}, {"label": "イ", "answer": "9"}, {"label": "ウ", "answer": "7"}, {"label": "エ", "answer": "13"}], "choices": [{"num": 1, "text": "主体"}, {"num": 2, "text": "内閣"}, {"num": 3, "text": "条約"}, {"num": 4, "text": "権力"}, {"num": 5, "text": "慣習法"}, {"num": 6, "text": "憲法付属法"}, {"num": 7, "text": "機関"}, {"num": 8, "text": "天皇"}, {"num": 9, "text": "命令"}, {"num": 10, "text": "判例"}, {"num": 11, "text": "公務員"}, {"num": 12, "text": "法規"}, {"num": 13, "text": "国会"}, {"num": 14, "text": "詔勅"}, {"num": 15, "text": "習律"}, {"num": 16, "text": "官職"}, {"num": 17, "text": "内閣総理大臣"}, {"num": 18, "text": "法律"}, {"num": 19, "text": "通達"}, {"num": 20, "text": "行政各部"}]}, {"source": "平成22年（2010年）問42", "year": "平成22年", "seireki": 2010, "qnum": 42, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "questionHtml": "取消訴訟の原告適格に関する次の文章の空欄<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">2</span><span class=\"bl-lab\">ア</span></span>～<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">1</span><span class=\"bl-lab\">エ</span></span>に当てはまる語句を、枠内の選択肢（1～20）から選びなさい。<br>平成16年（2004年）の行政事件訴訟法（以下、「行訴法」という。）改正のポイントとして、取消訴訟の原告適格の拡大がある。<br>取消訴訟の原告適格につき、行訴法9条（改正後の9条1項）は、「処分の取消しの訴え及び裁決の取消しの訴え（以下「取消訴訟」という。）は、当該処分又は裁決の取消しを求めるにつき<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">2</span><span class=\"bl-lab\">ア</span></span>を有する者・・・に限り、提起することができる。」と定めているが、最高裁判例は、ここでいう「当該処分の取消し求めるにつき『<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">2</span><span class=\"bl-lab\">ア</span></span>を有する者』とは、当該処分により自己の権利若しくは<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">10</span><span class=\"bl-lab\">イ</span></span>を侵害され又は必然的に侵害されるおそれのある者をいう」と解してきた。しかしながら、裁判実務上の原告適格の判断が狭いとの批判があり、平成16年改正により新たに行訴法9条に第2項が加えられ、「裁判所は、処分又は裁決の相手方以外の者について前項に規定する<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">2</span><span class=\"bl-lab\">ア</span></span>の有無を判断するに当たっては、当該処分又は裁決の根拠となる法令の規定の文言のみによることなく、当該法令の趣旨及び目的並びに当該処分において考慮されるべき<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">9</span><span class=\"bl-lab\">ウ</span></span>の内容及び性質を考慮するものとする」ことが規定された。そしてこの9条2項は、<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">1</span><span class=\"bl-lab\">エ</span></span>の原告適格についても準用されている。", "blanks": [{"label": "ア", "answer": "2"}, {"label": "イ", "answer": "10"}, {"label": "ウ", "answer": "9"}, {"label": "エ", "answer": "1"}], "choices": [{"num": 1, "text": "差止め訴訟"}, {"num": 2, "text": "法律上の利益"}, {"num": 3, "text": "権限"}, {"num": 4, "text": "憲法上保護された利益"}, {"num": 5, "text": "事実上の利益"}, {"num": 6, "text": "住民訴訟"}, {"num": 7, "text": "実質的当事者訴訟"}, {"num": 8, "text": "損害"}, {"num": 9, "text": "利益"}, {"num": 10, "text": "法律上保護された利益"}, {"num": 11, "text": "訴訟上保護された利益"}, {"num": 12, "text": "立法目的"}, {"num": 13, "text": "訴訟上の利益"}, {"num": 14, "text": "公益"}, {"num": 15, "text": "うべかりし利益"}, {"num": 16, "text": "不作為の違法確認訴訟"}, {"num": 17, "text": "法的地位"}, {"num": 18, "text": "公共の福祉"}, {"num": 19, "text": "紛争"}, {"num": 20, "text": "形式的当事者訴訟"}]}, {"source": "平成22年（2010年）問43", "year": "平成22年", "seireki": 2010, "qnum": 43, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "questionHtml": "原子炉施設の安全性に関する判断の適否が争われる原子炉設置許可処分の取消訴訟における裁判所の審理、判断は、原子力委員会若しくは原子炉安全専門審査会の専門技術的な<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">17</span><span class=\"bl-lab\">ア</span></span>及び判断を献じてされた被告行政庁の判断に<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">8</span><span class=\"bl-lab\">イ</span></span>があるか否かという観点から行われるべきであって、現在の科学技術水準に照らし、右<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">17</span><span class=\"bl-lab\">ア</span></span>において用いられた具体的<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">6</span><span class=\"bl-lab\">ウ</span></span>に<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">8</span><span class=\"bl-lab\">イ</span></span>があり、あるいは当該原子炉施設が右の具体的<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">6</span><span class=\"bl-lab\">ウ</span></span>に適合するとした原子力委員会若しくは原子炉安全専門審査会の<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">17</span><span class=\"bl-lab\">ア</span></span>及び<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">14</span><span class=\"bl-lab\">エ</span></span>に看過し難い過誤、欠落があり、被告行政庁の判断がこれに依拠してされたと認められる場合には、被告行政庁の右判断に<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">8</span><span class=\"bl-lab\">イ</span></span>があるものとして、右判断に基づく原子炉設置許可処分は違法と解すべきである。<br>原子炉設置許可処分についての右取消訴訟においては、右処分が前記のような性質を有することにかんがみると、被告行政庁がした右判断に<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">8</span><span class=\"bl-lab\">イ</span></span>があることの主張、立証責任は、本来、原告が負うべきものと解されるが、当該原子炉施設の安全審査に関する資料をすべて被告行政庁の側が保持していることなどの点を考慮すると、被告行政庁の側において、まず、その依拠した前記の具体的<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">6</span><span class=\"bl-lab\">ウ</span></span>並びに<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">17</span><span class=\"bl-lab\">ア</span></span>及び<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">14</span><span class=\"bl-lab\">エ</span></span>等、被告行政庁の判断に<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">8</span><span class=\"bl-lab\">イ</span></span>のないことを相当の根拠、資料に基づき主張、立証する必要があり、被告行政庁が右主張、立証を尽くさない場合には、被告行政庁がした右判断に<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">8</span><span class=\"bl-lab\">イ</span></span>があることが事実上推認されるものというべきである。<br>（最一小判平成4年10月29日民集46巻7号1174頁以下）", "blanks": [{"label": "ア", "answer": "17"}, {"label": "イ", "answer": "8"}, {"label": "ウ", "answer": "6"}, {"label": "エ", "answer": "14"}], "choices": [{"num": 1, "text": "妥当性"}, {"num": 2, "text": "要綱"}, {"num": 3, "text": "重大な事実の誤認"}, {"num": 4, "text": "予見可能性"}, {"num": 5, "text": "合理性"}, {"num": 6, "text": "審査基準"}, {"num": 7, "text": "答申"}, {"num": 8, "text": "不合理な点"}, {"num": 9, "text": "重大かつ明白な瑕疵"}, {"num": 10, "text": "判断枠組み"}, {"num": 11, "text": "省令"}, {"num": 12, "text": "事業計画"}, {"num": 13, "text": "勧告"}, {"num": 14, "text": "判断の過程"}, {"num": 15, "text": "政令"}, {"num": 16, "text": "根拠事実"}, {"num": 17, "text": "調査審議"}, {"num": 18, "text": "裁量の余地"}, {"num": 19, "text": "法令違背"}, {"num": 20, "text": "知見"}]}, {"source": "平成21年（2009年）問41", "year": "平成21年", "seireki": 2009, "qnum": 41, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "questionHtml": "<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">14</span><span class=\"bl-lab\">ア</span></span>は、憲法上、―（中略）―国務大臣の任免権（六八条）、<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">7</span><span class=\"bl-lab\">イ</span></span>を代表して<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">17</span><span class=\"bl-lab\">ウ</span></span>を指揮監督する職務権限（七二条）を有するなど、<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">7</span><span class=\"bl-lab\">イ</span></ /span>を科す旨の規定を設けることができる。<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">12</span><span class=\"bl-lab\">ウ</span></span>を科す手続については、法律に基づくものと、条例に基づくものとで相違がある。条例上の義務違反に対して普通地方公共団体の長が科す<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">12</span><span class=\"bl-lab\">ウ</span></span>は、<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">20</span><span class=\"bl-lab\">エ</span></span>に定める手続により科される。", "blanks": [{"label": "ア", "answer": "6"}, {"label": "イ", "answer": "1"}, {"label": "ウ", "answer": "12"}, {"label": "エ", "answer": "20"}], "choices": [{"num": 1, "text": "秩序罰"}, {"num": 2, "text": "行政代執行法"}, {"num": 3, "text": "科料"}, {"num": 4, "text": "公表"}, {"num": 5, "text": "拘禁"}, {"num": 6, "text": "行政罰"}, {"num": 7, "text": "代執行"}, {"num": 8, "text": "強制執行"}, {"num": 9, "text": "罰金"}, {"num": 10, "text": "刑事訴訟法"}, {"num": 11, "text": "間接強制"}, {"num": 12, "text": "過料"}, {"num": 13, "text": "課徴金"}, {"num": 14, "text": "非訟事件手続法"}, {"num": 15, "text": "行政刑罰"}, {"num": 16, "text": "直接強制"}, {"num": 17, "text": "禁錮"}, {"num": 18, "text": "懲戒罰"}, {"num": 19, "text": "行政事件訴訟法"}, {"num": 20, "text": "地方自治法"}]}, {"source": "平成21年（2009年）問43", "year": "平成21年", "seireki": 2009, "qnum": 43, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "questionHtml": "行政裁量に関する次の文章の空欄<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">16</span><span class=\"bl-lab\">ア</span></span>～<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">8</span><span class=\"bl-lab\">エ</span></span>に当てはまる語句を、枠内の選択肢（1～20）から選びなさい。<br>法律による行政の原理の下においても、法律が行政活動の内容を完全に規律しつくすことはできない。従って、法律が行政機関に自由な判断の余地を認めている場合があるが、これを裁量という。<br>例えば、国家公務員法82条1項3号は、職員に「国民全体の奉仕者たるにふさわしくない非行のあつた場合」、「懲戒処分として、免職、停職、減給又は戒告の処分をすることができる」と規定しているが、例えば、公務員が争議行為を行い、同号にいう「国民全体の奉仕者たるにふさわしくない非行のあつた場合」という<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">16</span><span class=\"bl-lab\">ア</span></span>に当たると判断される場合、処分の<span class=\"blank\" data-label=\"イ\"><span class=\"bl-ans\">5</span><span class=\"bl-lab\">イ</span></span>について裁量が認められるとするならば、当該公務員について免職処分を選択するか、あるいは停職その他の処分を選択するかについては、懲戒権者の判断に委ねられることになる。しかしながら、その場合にあっても、当該非行が極めて軽微なものにとどまるにもかかわらず、免職処分を選択した場合は、<span class=\"blank\" data-label=\"ウ\"><span class=\"bl-ans\">18</span><span class=\"bl-lab\">ウ</span></span>に違反し、裁量権の濫用・踰越となる。<br>また、土地収用法20条3号は、土地収用を行うことのできる事業の認定にあたっては、当該事業が「土地の適正且つ合理的な利用に寄与するもの」でなければならないとしている。この場合、<span class=\"blank\" data-label=\"ア\"><span class=\"bl-ans\">16</span><span class=\"bl-lab\">ア</span></span>についての裁量が問題となるが、判例は、その場合の裁量判断について、「本来最も重視すべき諸要素、諸価値を不当、安易に軽視し、その結果当然尽くすべき考慮を尽くさず、また本来考慮に容れるべきでない事項を考慮に容れもしくは本来過大に評価すべきでない事項を過重に評価し」、これらのことにより判断が左右された場合には、裁量権の濫用・踰越にあたるとして、違法となるとしている。これは処分における<span class=\"blank\" data-label=\"エ\"><span class=\"bl-ans\">8</span><span class=\"bl-lab\">エ</span></span>について、司法審査を及ぼしたものといえる。", "blanks": [{"label": "ア", "answer": "16"}, {"label": "イ", "answer": "5"}, {"label": "ウ", "answer": "18"}, {"label": "エ", "answer": "8"}], "choices": [{"num": 1, "text": "訴訟要件"}, {"num": 2, "text": "目的"}, {"num": 3, "text": "信義則"}, {"num": 4, "text": "相当の期間の経過"}, {"num": 5, "text": "効果"}, {"num": 6, "text": "補充性要件"}, {"num": 7, "text": "理由の提示"}, {"num": 8, "text": "判断過程"}, {"num": 9, "text": "過失"}, {"num": 10, "text": "行政便宜主義"}, {"num": 11, "text": "時の裁量"}, {"num": 12, "text": "手続規定"}, {"num": 13, "text": "紛争の成熟性"}, {"num": 14, "text": "違法性阻却事由"}, {"num": 15, "text": "保護義務"}, {"num": 16, "text": "要件"}, {"num": 17, "text": "行政規則"}, {"num": 18, "text": "比例原則"}, {"num": 19, "text": "手段"}, {"num": 20, "text": "行政の内部問題"}]}];
const KIJUTSU = [{"source": "令和7年（2025年）問44", "year": "令和7年", "seireki": 2025, "qnum": 44, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "problemText": "Xは、自己の所有地甲に建築物を建てるために、Y市の建築主事に建築確認を申請したが、建築基準法による建築制限に適合しないとして建築確認を拒否する処分（以下「本件処分」という）がなされた。Xは本件処分を不服として、Y市建築審査会に対して行政不服審査法に基づく審査請求を行ったが、審査庁は本件処分を適法であると判断し、請求を棄却する裁決を行った。ところが、建築審査会において議事に加わった委員の一人が、当該建築確認につき利害関係を有する者（建築基準法第82条）にあたるという手続上の瑕疵があることが判明した。そこで、Xは、この瑕疵を主張して、抗告訴訟を提起したいと考えている。 主張しようとする瑕疵がどのようなものであり、そのため、Xは、誰を被告としてどのような抗告訴訟を提起すべきか。40字程度で記述しなさい。 （参照条文） 建築基準法 （委員の除斥） 第82条　委員は、自己または三親等以内の親族の利害に関係のある事件については、・・・（中略）・・・審査請求に対する裁決に関する議事に加わることができない。", "modelAnswer": "裁決固有の瑕疵であり、Xは、Y市を被告として裁決の取消しの訴えを提起すべきである。"}, {"source": "令和7年（2025年）問45", "year": "令和7年", "seireki": 2025, "qnum": 45, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "problemText": "Aの配偶者であるBは、Aから法律行為に関する代理権を授与されていないにもかかわらず、Aが所有する高級腕時計甲につき、自身の海外旅行費用に充てるために、Aの代理人と称してCに売却する旨の売買契約（以下「本件契約」という）を締結した。このような場合におけるCのAに対する本件契約の履行請求の可否につき、判例は、民法110条（権限外の行為の表見代理）の趣旨を類推して相手方保護を図る旨を示した。判例は、Cにおいて、どのような場合に上記の類推適用を認めているかについて、40字程度で記述しなさい。", "modelAnswer": "本件契約が夫婦の日常家事に関する法律行為の範囲内に属すると信ずるにつき正当な理由がある場合"}, {"source": "令和7年（2025年）問46", "year": "令和7年", "seireki": 2025, "qnum": 46, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "problemText": "Aは、Bの所有する隣家の火災（以下「本件火災」という。本件火災は、AおよびBの故意・過失によるものではない）を見つけ、消防署に通報した。本件火災は、ボヤ（小火）であったので、これを消し止めることができると思い、Aは、Aの家に備え付けてあったA所有の消火器を用いて消火活動を開始した。この場合に、どのような法的根拠に基づき消火活動を継続しなければならないか。また、Aは、消火器を使ったため新たな消火器を購入する必要が生じたが、そのための費用を、どのような法的性質を有するものとしてBに対して償還を請求することができるか。民法の規定に照らして、40字程度で記述しなさい。", "modelAnswer": "事務管理に基づき継続しなければならない。本人のために有益な費用として償還請求できる。"}, {"source": "令和6年（2024年）問44", "year": "令和6年", "seireki": 2024, "qnum": 44, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "problemText": "総務大臣Yは、新たなテレビ放送局の開設を目的として、電波法に基づく無線局開設免許を1社のみに付与することを表明した。これを受けて、テレビ放送局を開設しようとする会社XがYに開設免許の申請をしたところ、Yは、その他の競願者の申請を含めて審査を実施し、会社Aに対しては免許を付与する処分（免許処分）をし、Xに対しては申請を棄却する処分（拒否処分）をした。 これに対し、Xは取消訴訟を提起して裁判上の救済を求めたいと考えている。競願関係をめぐる最高裁判所の判例の考え方に照らし、Xは誰を被告として、どのような処分に対する取消訴訟を提起できるか。なお、現行の電波法は、審査請求前置や裁決主義の規定を置いているが、それらは度外視して、直接に処分取消訴訟ができるものとして考え、40字程度で記述しなさい。", "modelAnswer": "Xは国を被告として、免許処分または拒否処分の取消訴訟を提起できる。"}, {"source": "令和6年（2024年）問45", "year": "令和6年", "seireki": 2024, "qnum": 45, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "problemText": "Aは、海外からコーヒー豆を輸入して国内の卸売業者に販売する事業を営んでいる。Aは、卸売業者Bにコーヒー豆1トン（以下「甲」という）を販売し、甲は、B所有の倉庫内に第三者に転売されることなくそのまま保管されている。Aは、Bに対し、甲の売買代金について、その支払期限経過後、支払って欲しい旨を伝えたが、Bは、経営不振を理由に、いまだAに支払っていない。BにはA以外にも一般債権者がいる。この場合に、Aは、甲についていかなる権利に基づき、どのような形で売買代金を確保することができるか。民法の規定に照らし、40字程度で記述しなさい。", "modelAnswer": "Aは、動産売買の先取特権に基づき、甲を競売し、一般債権者に先立って、売買代金を確保できる。"}, {"source": "令和6年（2024年）問46", "year": "令和6年", "seireki": 2024, "qnum": 46, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "problemText": "Aは、Bとの間で、BがCから購入した甲土地（以下「甲」という）を買い受ける契約を締結し、Bに対して代金全額を支払ったが、甲の登記名義はいまだCのままである。BC間の売買において、CがBへの移転登記を拒む理由は存在せず、また、BがCに対して移転登記手続をすべきことを請求している事実もない。一方、Aは、早期に甲の所有権取得の対抗要件として登記を具備したい。 このような場合、Aは、何のために、誰の誰に対するいかなる権利を、どのように行使できるか。40字程度で記述しなさい。", "modelAnswer": "Aは、移転登記請求権を保全するために、BのCに対する移転登記請求権を代位行使できる。"}, {"source": "令和5年（2023年）問44", "year": "令和5年", "seireki": 2023, "qnum": 44, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "problemText": "Y市議会の議員であるXは、2023年7月に開催されたY市議会の委員会において発言（以下「当該発言」という。）を行った。これに対して、当該発言は議会の品位を汚すものであり、Y市議会会議規則α条に違反するとして、Y市議会の懲罰委員会は、20日間の出席停止の懲罰を科すことが相当であるとの決定を行った。Y市議会の議員に対する懲罰は、本会議で議決することによって正式に決定されるところ、本会議の議決は、9月に招集される次の会期の冒頭で行うこととし、会期は終了した。これに対し、Xは、①問題となった当該発言は市政に関係する正当なものであり、議会の品位を汚すものではなく、会議規則には違反しない、②予定されている出席停止の懲罰は20日と期間が長く、これが科されると議員としての職責を果たすことができない、と考えている。\n9月招集予定の次の会期までの間において、Xは、出席停止の懲罰を回避するための手段（仮の救済手段も含め、行政事件訴訟法に定められているものに限る。）を検討している。次の会期の議会が招集されるまで1ヵ月程度の短い期間しかないことを考慮に入れたとき、誰に対してどのような手段をとることが有効適切か、40字程度で記述しなさい。\n（参照条文）\n地方自治法\n134条\n普通地方公共団体の議会は、この法律並びに会議規則及び委員会に関する条例に違反した議員に対し、議決により懲罰を科することができる。\n懲罰に関し必要な事項は、会議規則中にこれを定めなければならない。\n135条\n懲罰は、左の通りとする。\n一　公開の議場における戒告\n二　公開の議場における陳謝\n三　一定期間の出席停止\n四　除名\n以下略\nY市議会会議規則\nα条　議員は、議会の品位を重んじなければならない。", "modelAnswer": "Y市に対して、出席停止の懲罰の差止訴訟を提起し、仮の差止めを申立てることが有効適切。（42文字）"}, {"source": "令和5年（2023年）問45", "year": "令和5年", "seireki": 2023, "qnum": 45, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "problemText": "AがBに対して有する貸金債権の担保として、Bが所有する甲建物（以下「甲」という。）につき抵当権が設定され、設定登記が経由された。当該貸金債権につきBが債務不履行に陥った後、甲が火災によって焼失し、Bの保険会社Cに対する火災保険金債権が発生した。Aがこの保険金に対して優先弁済権を行使するためには、民法の規定および判例に照らし、どのような法的手段によって何をしなければならないか。40字程度で記述しなさい。", "modelAnswer": "抵当権に基づく物上代位により、火災保険金の払渡し前に、債権を差押えをしなければならない。"}, {"source": "令和5年（2023年）問46", "year": "令和5年", "seireki": 2023, "qnum": 46, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "problemText": "Aは、Aが所有する土地上に住宅を建築する旨の建築請負契約（以下「本件契約」という。）を工務店Bとの間で締結した。本件契約においては、Bの供する材料を用い、また、同住宅の設計もBに委ねることとされた。本件契約から6ヵ月経過後に、Aは、請負代金全額の支払いと引き換えに、完成した住宅の引渡しを受けた。しかし、その引渡し直後に、当該住宅の雨漏りが3ヵ所生じていることが判明し、Aは、そのことを直ちにBに通知した。この場合において、民法の規定に照らし、Aが、Bに対し、権利行使ができる根拠を示した上で、AのBに対する修補請求以外の3つの権利行使の方法について、40字程度で記述しなさい。", "modelAnswer": "契約不適合責任を根拠に、請負代金減額請求、損害賠償請求及び契約解除ができる。"}, {"source": "令和4年（2022年）問44", "year": "令和4年", "seireki": 2022, "qnum": 44, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "problemText": "開発事業者であるAは、建築基準法に基づき、B市建築主事から建築確認を受けて、マンションの建築工事を行い、工事完成後、Aは当該マンションの建物につき、検査の上、検査済証の交付を受けた。これに対して、当該マンションの隣地に居住するXらは、当該マンションの建築計画は建築基準法令に適合せず、建築確認は違法であり、当該マンションも、そのような建築計画に沿って建てられたものであるから違法であって、当該マンションの建物に火災その他の災害が発生した場合、建物が倒壊、炎上することにより、Xらの身体の安全や家屋に甚大な被害が生ずるおそれがあるとして、建築基準法に基づき違反建築物の是正命令を発出するよう、特定行政庁であるB市長に申し入れた。しかしながら、B市長は、当該建築確認および当該マンションの建物に違法な点はないとして、これを拒否することとし、その旨を通知した。\nこのようなB市長の対応を受け、Xらは、行政事件訴訟法の定める抗告訴訟を提起することにした。この場合において、①誰を被告として、②前記のような被害を受けるおそれがあることにつき、同法の定める訴訟要件として、当該是正命令がなされないことにより、どのような影響を生ずるおそれがあるものと主張し（同法の条文の表現を踏まえて記すこと。）、③どのような訴訟を起こすことが適切か。40字程度で記述しなさい。\n（参照条文）\n建築基準法\n（違反建築物に対する措置）\n第9条\n特定行政庁は、建築基準法令の規定又はこの法律の規定に基づく許可に付した条件に違反した建築物又は建築物の敷地については、当該建築物の建築主、当該建築物に関する工事の請負人（請負工事の下請人を含む。）若しくは現場管理者又は当該建築物若しくは建築物の敷地の所有者、管理者若しくは占有者に対して、当該工事の施工の停止を命じ、又は、相当の猶予期限を付けて、当該建築物の除却、移転、改築、増築、修繕、模様替、使用禁止、使用制限その他これらの規定又は条件に対する違反を是正するために必要な措置をとることを命ずることができる。", "modelAnswer": "Ｂ市を被告として、重大な損害が生ずるおそれがあると主張し、義務付けの訴えを提起する。（４２文字）※ 「義務付け訴訟」でもよい"}, {"source": "令和4年（2022年）問45", "year": "令和4年", "seireki": 2022, "qnum": 45, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "problemText": "Aが所有する甲不動産について、Aの配偶者であるBが、Aから何ら代理権を与えられていないにもかかわらず、Aの代理人と称して甲不動産をCに売却する旨の本件売買契約を締結した後、Bが死亡してAが単独で相続するに至った。CがAに対して、売主として本件売買契約を履行するよう求めた場合に、Aは、これを拒みたいと考えているが、認められるか。民法の規定および判例に照らし、その許否につき理由を付して40字程度で記述しなさい。", "modelAnswer": "Ａは、Ｂの無権代理行為について追認拒絶しても信義則に反しないから、履行を拒絶ができる。（４３文字）"}, {"source": "令和4年（2022年）問46", "year": "令和4年", "seireki": 2022, "qnum": 46, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "problemText": "Aは、工場を建設するために、Bから、Bが所有する甲土地（更地）を、賃貸借契約締結の日から賃借期間30年と定めて賃借した。ただし、甲土地の貸借権の登記は、現在に至るまでされていない。ところが、甲土地がBからAに引き渡される前に、甲土地に何らの権利も有しないCが、AおよびBに無断で、甲土地に塀を設置したため、Aは、甲土地に立ち入って工場の建設工事を開始することができなくなった。そこで、Aは、Bに対応を求めたが、Bは何らの対応もしないまま現在に至っている。Aが甲土地に工場の建設工事を開始するために、Aは、Cに対し、どのような請求をすることができるか。民法の規定および判例に照らし、40字程度で記述しなさい。", "modelAnswer": "例１）Ｂの所有権に基づく妨害排除請求権を債権者代位することで、塀の除去を請求することができる。"}, {"source": "令和3年（2021年）問44", "year": "令和3年", "seireki": 2021, "qnum": 44, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "problemText": "A私立の大学であるA大学は、その設備、授業その他の事項について、法令の規定に違反しているとして、学校教育法15条1項に基づき、文部科学大臣から必要な措置をとるべき旨の書面による勧告を受けた。しかしA大学は、指摘のような法令違反はないとの立場で、勧告に不服をもっている。この文部科学大臣の勧告は、行政手続法の定義に照らして何に該当するか。また、それを前提に同法に基づき、誰に対して、どのような手段をとることができるか。40字程度で記述しなさい。なお、当該勧告に関しては、A大学について弁明その他意見陳述のための手続は規定されておらず、運用上もなされなかったものとする。\n（参照条文）\n学校教育法\n第15条第1項\n文部科学大臣は、公立又は私立の大学及び高等専門学校が、設備、授業その他の事項について、法令の規定に違反していると認めるときは、当該学校に対し、必要な措置をとるべきことを勧告することができる。（以下略）", "modelAnswer": "行政指導に該当し、文部科学大臣に対して、当該勧告の中止等を求めることができる。"}, {"source": "令和3年（2021年）問45", "year": "令和3年", "seireki": 2021, "qnum": 45, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "problemText": "Aは、Bに対して100万円の売掛代金債権（以下「本件代金債権」といい、解答にあたっても、この語を用いて解答すること。）を有し、本件代金債権については、A・B間において、第三者への譲渡を禁止することが約されていた。しかし、Aは、緊急に資金が必要になったため、本件代金債権をCに譲渡し、Cから譲渡代金90万円を受領するとともに、同譲渡について、Bに通知し、同通知は、Bに到達した。そこで、Cは、Bに対して、本件代金債権の履行期後に本件代金債権の履行を請求した。Bが本件代金債権に係る債務の履行を拒むことができるのは、どのような場合か。民法の規定に照らし、40字程度で記述しなさい。\nなお、BのAに対する弁済その他の本件代金債権に係る債務の消滅事由はなく、また、Bの本件代金債権に係る債務の供託はないものとする。", "modelAnswer": "Cが、本件代金債権の譲渡制限の意思表示を知り、又は重大な過失により知らなかった場合。"}, {"source": "令和3年（2021年）問46", "year": "令和3年", "seireki": 2021, "qnum": 46, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "problemText": "Aが所有する甲家屋につき、Bが賃借人として居住していたところ、甲家屋の2階部分の外壁が突然崩落して、付近を通行していたCが負傷した。甲家屋の外壁の設置または管理に瑕疵があった場合、民法の規定に照らし、誰がCに対して損害賠償責任を負うことになるか。必要に応じて場合分けをしながら、40字程度で記述しなさい。", "modelAnswer": "原則、Bが責任負い、Bが損害の発生を防止するのに必要な注意をしたときは、Aが責任を負う。"}, {"source": "令和2年（2020年）問44", "year": "令和2年", "seireki": 2020, "qnum": 44, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "problemText": "A県内の一定区域において、土地区画整理事業（これを「本件事業」という。）が計画された。それを施行するため、土地区画整理法に基づくA県知事の認可（これを「本件認可処分」という。）を受けて、土地区画整理組合（これを「本件組合」という。）が設立され、あわせて本件事業にかかる事業計画も確定された。これを受けて本件事業が施行され、工事の完了などを経て、最終的に、本件組合は、換地処分（これを「本件換地処分」という。）を行った。\nXは、本件事業の区域内の宅地につき所有権を有し、本件組合の組合員であるところ、本件換地処分は換地の配分につき違法なものであるとして、その取消しの訴えを提起しようと考えたが、同訴訟の出訴期間がすでに経過していることが判明した。\nこの時点において、本件換地処分の効力を争い、換地のやり直しを求めるため、Xは、誰を被告として、どのような行為を対象とする、どのような訴訟（行政事件訴訟法に定められている抗告訴訟に限る。）を提起すべきか。40字程度で記述しなさい。", "modelAnswer": "Xは、本件組合を被告として、本件換地処分を対象とする無効等確認の訴えを提起すべきである。"}, {"source": "令和2年（2020年）問45", "year": "令和2年", "seireki": 2020, "qnum": 45, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "problemText": "Aは、Bとの間で、A所有の甲土地をBに売却する旨の契約（以下、「本件契約」という。）を締結したが、Aが本件契約を締結するに至ったのは、平素からAに恨みをもっているCが、Aに対し、甲土地の地中には戦時中に軍隊によって爆弾が埋められており、いつ爆発するかわからないといった嘘の事実を述べたことによる。Aは、その爆弾が埋められている事実をBに伝えた上で、甲土地を時価の2分の1程度でBに売却した。売買から1年後に、Cに騙されたことを知ったAは、本件契約に係る意思表示を取り消すことができるか。民法の規定に照らし、40字程度で記述しなさい。なお、記述にあたっては、「本件契約に係るAの意思表示」を「契約」と表記すること。", "modelAnswer": "Aは、BがCの詐欺を知り、又は知ることができたときに限り、契約を取り消すことができる。"}, {"source": "令和2年（2020年）問46", "year": "令和2年", "seireki": 2020, "qnum": 46, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "problemText": "以下の［設例］および［判例の解説］を読んで記述せよ。\n［設例］\nA所有の甲不動産をBが買い受けたが登記未了であったところ、その事実を知ったCが日頃Bに対して抱いていた怨恨（えんこん）の情を晴らすため、AをそそのかしてもっぱらBを害する目的で甲不動産を二重にCに売却させ、Cは、登記を了した後、これをDに転売して移転登記を完了した。Bは、Dに対して甲不動産の取得を主張することができるか。\n［判例の解説］\n上記［設例］におけるCはいわゆる背信的悪意者に該当するが、判例はかかる背信的悪意者からの転得者Dについて、無権利者からの譲受人ではなくD自身が背信的悪意者と評価されるのでない限り、甲不動産の取得をもってBに対抗しうるとしている。\n上記の［設例］について、上記の［判例の解説］の説明は、どのような理由に基づくものか。「背信的悪意者は」に続けて、背信的悪意者の意義をふまえつつ、Dへの譲渡人Cが無権利者でない理由を、40字程度で記述しなさい。", "modelAnswer": "（背信的悪意者は、）登記の欠缺を主張することが信義則に反して許されないが、AC間の売買自体は有効であるから。（44文字）"}, {"source": "令和元年（2019年）問44", "year": "令和元年", "seireki": 2019, "qnum": 44, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "problemText": "令和元年・2019｜問44｜行政法\nA所有の雑居ビルは、消防法上の防火対象物であるが、非常口が設けられていないなど、消防法等の法令で定められた防火施設に不備があり、危険な状態にある。しかし、その地域を管轄する消防署の署長Yは、Aに対して改善するよう行政指導を繰り返すのみで、消防法5条1項所定の必要な措置をなすべき旨の命令（「命令」という。）をすることなく、放置している。こうした場合、行政手続法によれば、Yに対して、どのような者が、どのような行動をとることができるか。また、これに対して、Yは、どのような対応をとるべきこととされているか。40字程度で記述しなさい。\n（参照条文）\n消防法\n第5条第1項　消防長又は消防署長は、防火対象物の位置、構造、設備又は管理の状況について、火災の予防に危険であると認める場合、消火、避難その他の消防の活動に支障になると認める場合、火災が発生したならば人命に危険であると認める場合その他火災の予防上必要があると認める場合には、権限を有する関係者（略）に対し、当該防火対象物の改修、移転、除去、工事の停止又は中止その他の必要な措置をなすべきことを命ずることができる。（以下略）", "modelAnswer": "何人も、命令を求めることができ、Yは、必要な調査を行い、当該命令をしなければならない。（43文字）"}, {"source": "令和元年（2019年）問45", "year": "令和元年", "seireki": 2019, "qnum": 45, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "problemText": "令和元年・2019｜問45｜民法\nAは、木造2階建ての別荘一棟（同建物は、区分所有建物でない建物である。）をBら4名と共有しているが、同建物は、建築後40年が経過したこともあり、雨漏りや建物の多くの部分の損傷が目立つようになってきた。そこで、Aは、同建物を建て替えるか、または、いくつかの建物部分を修繕・改良（以下「修繕等」といい、解答においても「修繕等」と記すること。）する必要があると考えている。これらを実施するためには、建替えと修繕等のそれぞれの場合について、前記共有者5名の間でどのようなことが必要か。「建替えには」に続けて、民法の規定に照らし、下線部について40字程度で記述しなさい（「建替えには」は、40字程度に数えない。）。\nなお、上記の修繕等については民法の定める「変更」や「保存行為」には該当しないものとし、また、同建物の敷地の権利については考慮しないものとする。", "modelAnswer": "（建替えには、）共有者全員の同意が必要で、修繕等には、各共有者の持分の価格の過半数による決定が必要。（42文字）"}, {"source": "令和元年（2019年）問46", "year": "令和元年", "seireki": 2019, "qnum": 46, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "problemText": "令和元年・2019｜問46｜民法\nＡは、自己所有の時計を代金50万円でＢに売る契約を結んだ。その際、Ａは、Ｃから借りていた50万円をまだ返済していなかったので、Ｂとの間で、Ｃへの返済方法としてＢがＣに50万円を支払う旨を合意し、時計の代金50万円はＢがＣに直接支払うこととした。このようなＡ・Ｂ間の契約を何といい、また、この契約に基づき、Ｃの上記50万円の代金支払請求権が発生するためには、誰が誰に対してどのようなことをする必要があるか。民法の規定に照らし、下線部について40字程度で記述しなさい。", "modelAnswer": "第三者のためにする契約といい、ＣがＢに対して50万円を受け取る意思表示をする必要がある。"}, {"source": "平成30年（2018年）問44", "year": "平成30年", "seireki": 2018, "qnum": 44, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "problemText": "Ｘは、Ａ県Ｂ市内において、農地を所有し、その土地において農業を営んできた。しかし、高齢のため農作業が困難となり、後継者もいないため、農地を太陽光発電施設として利用することを決めた。そのために必要な農地法4条1項所定のＡ県知事による農地転用許可を得るため、その経由機関とされているＢ市農業委員会の担当者と相談したところ、「Ｂ市内においては、太陽光発電のための農地転用は認められない。」として、申請用紙の交付を拒否された。そこで、Ｘは、インターネットから入手した申請用紙に必要事項を記入してＡ県知事宛ての農地転用許可の申請書を作成し、必要な添付書類とともにＢ市農業委員会に郵送した。ところが、これらの書類は、「この申請書は受理できません。」とするＢ市農業委員会の担当者名の通知を添えて返送されてきた。この場合、農地転用許可を得るため、Ｘは、いかなる被告に対し、どのような訴訟を提起すべきか。40字程度で記述しなさい。\n（参照条文）\n農地法\n（農地の転用の制限）\n第4条　農地を農地以外のものにする者は、都道府県知事（中略）の許可を受けなければならない。（以下略）\n2　前項の許可を受けようとする者は、農林水産省令で定めるところにより、農林水産省令で定める事項を記載した申請書を、農業委員会を経由して、都道府県知事等に提出しなければならない。\n3　農業委員会は、前項の規定により申請書の提出があったときは、農林水産省令で定める期間内に、当該申請書に意見を付して、都道府県知事等に送付しなければならない。", "modelAnswer": "Ａ県を被告として、不作為の違法確認訴訟と農地転用許可の義務付け訴訟を併合提起すべき。"}, {"source": "平成30年（2018年）問45", "year": "平成30年", "seireki": 2018, "qnum": 45, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "problemText": "画家Ａは、ＢからＡの絵画（以下「本件絵画」といい、評価額は500万円～600万円であるとする。）を購入したい旨の申込みがあったため、500万円で売却することにした。ところが、Ａ・Ｂ間で同売買契約（本問では、「本件契約」とする。）を締結したときに、Ｂは、成年被後見人であったことが判明したため（成年後見人はＣであり、その状況は現在も変わらない。）、Ａは、本件契約が維持されるか否かについて懸念していたところ、Ｄから本件絵画を気に入っているため600万円ですぐにでも購入したい旨の申込みがあった。Ａは、本件契約が維持されない場合には、本件絵画をＤに売却したいと思っている。Ａが本件絵画をＤに売却する前提として、Ａは、誰に対し、1か月以上の期間を定めてどのような催告をし、その期間内にどのような結果を得る必要があるか。なお、ＡおよびＤは、制限行為能力者ではない。\n「Ａは、」に続け、下線部分につき40字程度で記述しなさい。記述に当たっては、「本件契約」を入れることとし、他方、「1か月以上の期間を定めて」および「その期間内に」の記述は省略すること。", "modelAnswer": "「Ａは、」Ｃに対し、本件契約を追認するか否か確答すべき旨の催告をし、追認拒絶の結果を得る。"}, {"source": "平成30年（2018年）問46", "year": "平成30年", "seireki": 2018, "qnum": 46, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "problemText": "甲自動車（以下「甲」という。）を所有するＡは、別の新車を取得したため、友人であるＢに対して甲を贈与する旨を口頭で約し、Ｂも喜んでこれに同意した。しかしながら、Ａは、しばらくして後悔するようになり、Ｂとの間で締結した甲に関する贈与契約をなかったことにしたいと考えるに至った。甲の引渡しを求めているＢに対し、Ａは、民法の規定に従い、どのような理由で、どのような法的主張をすべきか。40字程度で記述しなさい。なお、この贈与契約においては無効および取消しの原因は存在しないものとする。", "modelAnswer": "Ａは、書面によらず、履行が終わっていないことを理由に、贈与契約を解除すべき。"}, {"source": "平成29年（2017年）問44", "year": "平成29年", "seireki": 2017, "qnum": 44, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "problemText": "Ａ市は、市内へのパチンコ店の出店を規制するため、同市内のほぼ全域を出店禁止区域とする条例を制定した。しかし、事業者Ｙは、この条例は国の法令に抵触するなどと主張して、禁止区域内でのパチンコ店の建設に着手した。これに対して、Ａ市は、同条例に基づき市長名で建設の中止命令を発したが、これをＹが無視して建設を続行しているため、Ａ市は、Ｙを被告として建設の中止を求める訴訟を提起した。最高裁判所の判例によれば、こうした訴訟は、どのような立場でＡ市が提起したものであるとされ、また、どのような理由で、どのような判決がなされるべきこととなるか。40字程度で記述しなさい。", "modelAnswer": "行政権の主体とした立場で提起したとされ、法律上の争訟ではなく、却下判決がなされる。"}, {"source": "平成29年（2017年）問45", "year": "平成29年", "seireki": 2017, "qnum": 45, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "problemText": "ＡはＢに対して100万円の売買代金債権を有していたが、同債権については、Ａ・Ｂ間で譲渡禁止特約が付されていた。しかし、Ａは、特約に違反して、上記100万円の売買代金債権をその弁済期経過後にＣに対して譲渡し、その後、Ａが、Ｂに対し、Ｃに譲渡した旨の通知をした。Ｂは、その通知があった後直ちに、Ａに対し、上記特約違反について抗議しようとしていたところ、Ｃが上記100万円の売買代金の支払を請求してきた。この場合に、Ｂは、Ｃの請求に応じなければならないかについて、民法の規定および判例に照らし、40字程度で記述しなさい。", "modelAnswer": "Ｂは、Ｃが譲渡禁止特約について悪意または重過失の場合、Ｃの請求に応じる必要はない。（41文字）"}, {"source": "平成29年（2017年）問46", "year": "平成29年", "seireki": 2017, "qnum": 46, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "problemText": "不法行為による損害賠償請求権は、被害者またはその法定代理人が、いつの時点から何年間行使しないときに消滅するかについて、民法が規定する2つの場合を、40字程度で記述しなさい。", "modelAnswer": "損害および加害者を知った時から3年間、または不法行為の時から20年間行使しないとき。"}, {"source": "平成28年（2016年）問44", "year": "平成28年", "seireki": 2016, "qnum": 44, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "problemText": "Ａ市は、Ａ市路上喫煙禁止条例を制定し、同市の指定した路上喫煙禁止区域内の路上で喫煙した者について、2万円以下の過料を科す旨を定めている。Ｘは、路上喫煙禁止区域内の路上で喫煙し、同市が採用した路上喫煙指導員により発見された。この場合、Ｘに対する過料を科すための手続は、いかなる法律に定められており、また、同法によれば、この過料は、いかなる機関により科されるか。さらに、行政法学において、このような過料による制裁を何と呼んでいるか。40字程度で記述しなさい。", "modelAnswer": "Ａ市長により、地方自治法の定める手続きによって科され、これを秩序罰と呼ぶ。"}, {"source": "平成28年（2016年）問45", "year": "平成28年", "seireki": 2016, "qnum": 45, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "problemText": "改正民法により、問題不成立（解かなくても大丈夫です）\nＡは、Ｂとの間でＢ所有の甲土地（以下「甲」という。）につき売買契約（以下「契約」という。）を締結し、その後、契約に基づいて、Ｂに対し売買代金を完済して、Ｂから甲の引き渡しを受け、その旨の登記がなされた。ただ、甲については、契約の締結に先だって、ＢがＣから借り受けた金銭債務を担保するために、Ｃのために抵当権が設定され、その旨の登記がなされていた。この場合において、Ａは、Ｂに対し、Ｃの抵当権に関し、どのようになったときに、どのような主張をすることができるかについて、民法の規定に照らし、40字程度で記述しなさい。\nなお、本問においては、Ａは、Ｃに対する第三者としての弁済、Ｃの請求に応じた代価弁済、または、Ｃに対する抵当権消滅請求は行わないものとする。", "modelAnswer": "抵当権が実行されて、甲の所有権を失ったときに、契約の解除および損害賠償を主張できる。（42文字） Ａは、抵当権が実行されたときに、契約の解除と受けた損害の賠償請求を主張できる。"}, {"source": "平成28年（2016年）問46", "year": "平成28年", "seireki": 2016, "qnum": 46, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "problemText": "民法の規定によれば、離婚の財産上の法的効果として、離婚した夫婦の一方は、相手方に対して財産の分与を請求することができる。判例は、離婚に伴う財産分与の目的ないし機能には3つの要素が含まれ得ると解している。この財産分与の3つの要素の内容について、40字程度で記述しなさい。", "modelAnswer": "婚姻中の共同財産の清算及び離婚後の一方の生計維持ならびに精神的損害の賠償を含む。"}, {"source": "平成27年（2015年）問44", "year": "平成27年", "seireki": 2015, "qnum": 44, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "problemText": "Ｘは、Ｙ県内で開発行為を行うことを計画し、Ｙ県知事に都市計画法に基づく開発許可を申請した。しかし、知事は、この開発行為によりがけ崩れの危険があるなど、同法所定の許可要件を充たさないとして、申請を拒否する処分をした。これを不服としたＸは、Ｙ県開発審査会に審査請求をしたが、同審査会も拒否処分を妥当として審査請求を棄却する裁決をした。このため、Ｘは、申請拒否処分と棄却裁決の両方につき取消訴訟を提起した。このうち、裁決取消訴訟の被告はどこか。また、こうした裁決取消訴訟においては、一般に、どのような主張が許され、こうした原則を何と呼ぶか。40字程度で記述しなさい。", "modelAnswer": "被告はＹ県であり、一般に、裁決の違法の主張が許され、この原則を原処分主義という。"}, {"source": "平成27年（2015年）問45", "year": "平成27年", "seireki": 2015, "qnum": 45, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "problemText": "権原の性質上、占有者に所有の意思のない他主占有が、自主占有に変わる場合として2つの場合がある。民法の規定によると、ひとつは、他主占有者が自己に占有させた者に対して所有の意思があることを表示した場合である。もうひとつはどのような場合か、40字程度で記述しなさい。", "modelAnswer": "他主占有者が、新たな権原により更に所有の意思をもって占有を始めた場合。"}, {"source": "平成27年（2015年）問46", "year": "平成27年", "seireki": 2015, "qnum": 46, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "problemText": "ＡとＢは婚姻し、3年後にＢが懐胎したが、その頃から両者は不仲となり別居状態となり、その後にＣが出生した。Ｂは、ＡにＣの出生を知らせるとともに、Ａとの婚姻関係を解消したいこと、Ｃの親権者にはＢがなること、およびＡはＣの養育費としてＢに対し毎月20万円を支払うことを求め、Ａもこれを了承して協議離婚が成立した。ところが離婚後、Ａは、Ｂが別居を始める前から他の男性と交際していたことを知り、Ｃが自分の子であることに疑いを持った。\nこのような事情において、Ｃが自分の子でないことを確認するため、Ａは誰を相手として、いつまでに、どのような手続をとるべきか。民法の規定および判例に照らし、とるべき法的手段の内容を40字程度で記述しなさい。", "modelAnswer": "ＡはＣ又はＢを相手として、Ｃの出生を知った時から３年以内に、嫡出否認の訴えを提起すべき。"}, {"source": "平成26年（2014年）問44", "year": "平成26年", "seireki": 2014, "qnum": 44, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "problemText": "Ａ市は、同市内に市民会館を設置しているが、その運営は民間事業者である株式会社Ｂに委ねられており、利用者の申請に対する利用の許可なども、Ｂによってなされている。住民の福利を増進するためその利用に供するために設置される市民会館などを地方自治法は何と呼び、また、その設置などに関する事項は、特別の定めがなければ、どの機関によりどのような形式で決定されるか。さらに、同法によれば、その運営に当たるＢのような団体は、何と呼ばれるか。40字程度で記述しなさい。", "modelAnswer": "公の施設と呼び、Ａ市議会による条例で定められ、Ｂのような団体は指定管理者と呼ばれる。"}, {"source": "平成26年（2014年）問45", "year": "平成26年", "seireki": 2014, "qnum": 45, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "problemText": "Ａは複数の債権者から債務を負っていたところ、債権者の一人で懇意にしているＢと相談の上、Ｂに優先的な満足を得させる意図で、Ａ所有の唯一の財産である甲土地を、代物弁済としてＢに譲渡した。その後、Ｂは同土地を、上記事情を知らないＣに時価で売却し、順次、移転登記がなされた。この場合において、Ａのほかの債権者Ｘは、自己の債権を保全するために、どのような権利に基づき、誰を相手として、どのような対応をとればよいか。判例の立場を踏まえて40字程度で記述しなさい。", "modelAnswer": "詐害行為取消権に基づき、Ｂを相手に、裁判により、代物弁済契約を取消し、価格賠償を求める。"}, {"source": "平成26年（2014年）問46", "year": "平成26年", "seireki": 2014, "qnum": 46, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "problemText": "民法改正に伴い、問題が使えなくなりましたので、解説は省略します。\nＸは、甲土地をＹに対して売却する契約（以下、「本件契約」という。）を締結したが、Ｘは、本件契約時において、売却した甲土地はAが所有するものであってＸに属しないことを知らなかった。その後、Ｘは、Aに対して甲土地の売却を申し入れたが、拒絶されたため、結局、その所有権を取得してＹに移転することができなかった。このような場合において、善意の売主Ｘは、買主Ｙに対し、本件契約を解除する旨の意思表示をしたい。解除にあたって、本件契約時に甲土地の所有権がＸに属しないことについて、Ｙが悪意のときは、どのようなことをし、Ｙが善意のときは、それに加えてどのようなことをすればよいか。「Ｙが悪意のときは、」および「Ｙが善意のときは、それに加えて、」に続けて、民法の規定を踏まえて、それぞれ10字～20字程度で記述しなさい（「Ｙが悪意のときは、」および「Ｙが善意のときは、それに加えて、」は、記述すべき字数に含まれない）。", "modelAnswer": "－"}, {"source": "平成25年（2013年）問44", "year": "平成25年", "seireki": 2013, "qnum": 44, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "problemText": "Ａが建築基準法に基づく建築確認を得て自己の所有地に建物を建設し始めたところ、隣接地に居住するＢは、当該建築確認の取消しを求めて取消訴訟を提起すると共に、執行停止を申し立てた。執行停止の申立てが却下されたことからＡが建設を続けた結果、訴訟係属中に建物が完成し、検査済証が交付された。最高裁判所の判例によると、この場合、①建築確認の法的効果がどのようなものであるため、②工事完了がＢの訴えの訴訟要件にどのような影響を与え、③どのような判決が下されることになるか。40字程度で記述しなさい。", "modelAnswer": "建築確認は、適法に工事を行える法的効果しかないため、訴えの利益が消滅し却下判決が下される。"}, {"source": "平成25年（2013年）問45", "year": "平成25年", "seireki": 2013, "qnum": 45, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "problemText": "Ａは、Ｂに対し、Ｃの代理人であると偽り、Ｂとの間でＣを売主とする売買契約（以下、「本件契約」という。）を締結した。ところが、ＣはＡの存在を知らなかったが、このたびＢがＡ・Ｂ間で締結された本件契約に基づいてＣに対して履行を求めてきたので、Ｃは、Ｂからその経緯を聞き、はじめてＡの存在を知るに至った。他方、Ｂは、本件契約の締結時に、ＡをＣの代理人であると信じ、また、そのように信じたことについて過失はなかった。Ｂは、本件契約を取り消さずに、本件契約に基づいて、Ａに対して何らかの請求をしようと考えている。このような状況で、ＡがＣの代理人であることを証明することができないときに、Ｂは、Ａに対して、どのような要件の下で（どのようなことがなかったときにおいて）、どのような請求をすることができるか。「Ｂは、Ａに対して、」に続けて、下線部について、40字程度で記述しなさい（「Ｂは、Ａに対して、」は、40字程度の字数には入らない）。", "modelAnswer": "Ａが行為能力を有し、Ｃの追認がなかったとき、履行又は損害賠償の請求をすることができる。"}, {"source": "平成25年（2013年）問46", "year": "平成25年", "seireki": 2013, "qnum": 46, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "problemText": "Ａの指輪が、Ｂによって盗まれ、Ｂから、事情を知らない宝石店Ｃに売却された。Ｄは、宝石店Ｃからその指輪を50万円で購入してその引渡しを受けたが、Ｄもまたそのような事情について善意であり、かつ無過失であった。盗難の時から1年6か月後、Ａは、盗まれた指輪がＤのもとにあることを知り、同指輪をＤから取り戻したいと思っている。この場合、Ａは、Ｄに対し指輪の返還を請求することができるか否かについて、必要な、または関係する要件に言及して、40字程度で記述しなさい。", "modelAnswer": "Ａは、盗難の時から2年以内に、Ｄに50万円を弁償すれば、Ｄに指輪の返還請求ができる。"}, {"source": "平成24年（2012年）問44", "year": "平成24年", "seireki": 2012, "qnum": 44, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "problemText": "Ｘは、Ａ県 Ｂ市内に土地を所有していたが、Ｂ市による市道の拡張工事のために、当該土地の買収の打診を受けた。Ｘは、土地を手放すこと自体には異議がなかったものの、Ｂ市から提示された買収価格に不満があったため、買収に応じなかった。ところが、Ｂ市の申請を受けたＡ県収用委員会は、当該土地について土地収用法48条に基づく収用裁決(権利取得裁決)をした。しかし、Ｘは、この裁決において決定された損失補償の額についても、低額にすぎるとして、不服である。より高額な補償を求めるためには、Ｘは、だれを被告として、どのような訴訟を提起すべきか。また、このような訴訟を行政法学において何と呼ぶか。40字程度で記述しなさい。", "modelAnswer": "Ｂ市を被告として、損失補償の増額請求の訴えを提起すべきで、形式的当事者訴訟と呼ぶ。"}, {"source": "平成24年（2012年）問45", "year": "平成24年", "seireki": 2012, "qnum": 45, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "problemText": "ＡがＢに金銭を貸し付けるにあたり、書面により、Ｃが保証人（Ｂと連帯して債務を負担する連帯保証人ではない。）となり、また、Ｄが物上保証人としてＤ所有の土地に抵当権を設定しその旨の登記がなされた。弁済期を徒過したので、Ａは、Ｂに弁済を求めたところ、Ｂは、「ＣまたはＤに対して請求して欲しい」と応えて弁済を渋った。そこで、Ａは、Ｄに対しては何らの請求や担保権実行手続をとることなく、Ｃに対してのみ弁済を請求した。この場合において、Ｃは、Ａの請求に対し、どのようなことを証明すれば弁済を拒むことができるか。40字程度で記述しなさい。", "modelAnswer": "Ｂに弁済する資力があり、かつ、その執行が容易であることを証明した場合、拒むことができる。"}, {"source": "平成24年（2012年）問46", "year": "平成24年", "seireki": 2012, "qnum": 46, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "problemText": "次の文章は遺言に関する相談者と回答者の会話である。〔 　　　〕の中に、どのような請求によって、何について遺言を失効させるかを40字程度で記述しなさい。\n相談者\n今日は遺言の相談に参りました。私は夫に先立たれて独りで生活しています。亡くなった夫との間には息子が一人おりますが、随分前に家を出て一切交流もありません。私には、少々の預金と夫が遺してくれた土地建物がありますが、少しでも世の中のお役に立てるよう、私が死んだらこれらの財産一切を慈善団体Ａに寄付したいと思っております。このような遺言をすることはできますか。」\n回答者\n「もちろん、そのような遺言をすることはできます。ただ「財産一切を慈善団体Ａに寄付する」という内容が、必ずしもそのとおりになるとは限りません。というのも、相続人である息子さんは、〔 　　　〕からです。そのようにできるのは、被相続人の財産処分の自由を保障しつつも、相続人の生活の安定及び財産の公平分配をはかるためです｡」", "modelAnswer": "遺留分減殺請求によって、相続財産の2分の1について遺言を失効させることができる"}, {"source": "平成23年（2011年）問44", "year": "平成23年", "seireki": 2011, "qnum": 44, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "problemText": "以下に引用する消防法29条1項による消防吏員・消防団員の活動（「破壊消防」と呼ばれることがある）は、行政法学上のある行為形式（行為類型）に属するものと解されている。その行為形式は、どのような名称で呼ばれ、どのような内容のものと説明されているか。40字程度で記述しなさい。\n消防法29条1項\n消防吏員又は消防団員は、消火若しくは延焼の防止又は人命の救助のために必要があるときは、火災が発生せんとし、又は発生した消防対象物及びこれらのものの在る土地を使用し、処分し又はその使用を制限することができる。", "modelAnswer": "即時強制と呼ばれ､義務の不履行を前提とせずに、国民の身体や財産に直接実力を行使するもの。"}, {"source": "平成23年（2011年）問45", "year": "平成23年", "seireki": 2011, "qnum": 45, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "problemText": "Ａの抵当権（登記済み）が存する甲土地をその所有者Ｂから買い受け、甲土地の所有権移転登記を済ませたＣは、同抵当権を消滅させたいと思っている。抵当権が消滅する場合としては、被担保債権または抵当権の消滅時効のほかに、Ｃが、Ｂの債権者である抵当権者Ａに対し被担保債権額の全部をＢのために弁済することが考えられるが、そのほかに、抵当権が消滅する場合を二つ、40字程度で記述しなさい。", "modelAnswer": "ＣがＡに対して抵当権消滅請求をした場合及びＣがＡの請求に応じて甲土地の代価を弁済した場合。"}, {"source": "平成23年（2011年）問46", "year": "平成23年", "seireki": 2011, "qnum": 46, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "problemText": "作家Ｙに雇用されている秘書Ａは、Ｙ名義で5万円以下のＹの日用品を購入する権限しか付与されていなかったが、Ｙに無断でＸからＹのために50万円相当の事務機器を購入した。しかし、Ｘは、Ａに事務機器を購入する権限があるものと信じて取引をし、Ｙに代金の支払いを請求したところ、Ｙはその支払いを拒絶した。このようなＹの支払い拒絶を不当と考えたＸは、Ｙに対して、支払いの請求、およびそれに代わる請求について検討した。この場合において、Ｘは、どのような根拠に基づき、いかなる請求をすればよいか。「Ｘは、Ｙに対して、」に続けて、考えられる請求内容を二つ、40字程度で記述しなさい。", "modelAnswer": "権限外の表見代理に基づき代金支払いの請求をするか、使用者責任に基づき損害賠償請求をする。"}, {"source": "平成22年（2010年）問44", "year": "平成22年", "seireki": 2010, "qnum": 44, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "problemText": "Ｙ組合の施行する土地区画整理事業の事業地内に土地を所有していたＸは、Ｙの換地処分によって、従前の土地に換えて新たな土地を指定された。\nしかし、Ｘは、新たに指定された土地が従前の土地に比べて狭すぎるため、換地処分は土地区画整理法に違反すると主張して、Ｙを被告として、換地処分の取消訴訟を提起した。\n審理の結果、裁判所は、Ｘの主張のとおり、換地処分は違法であるとの結論に達した。\nしかし、審理中に、問題の土地区画整理事業による造成工事は既に完了し、新たな土地所有者らによる建物の建設も終了するなど、Ｘに従前の土地を返還するのは極めて困難な状況となっている。\nこの場合、裁判所による判決は、どのような内容の主文となり、また、このような判決は何と呼ばれるか。40字程度で記述しなさい。", "modelAnswer": "請求を棄却するとともに、処分の違法を宣言することを主文とする判決で、事情判決と呼ばれる。"}, {"source": "平成22年（2010年）問45", "year": "平成22年", "seireki": 2010, "qnum": 45, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "problemText": "民法改正に伴い、問題が使えなくなりましたので、解説は省略します。\nＡは、Ｂから金銭を借り受けたが、その際、Ａ所有の甲土地に抵当権が設定されて、その旨の登記が経由され、また、Ｃが連帯保証人となった。その後、ＣはＢに対してＡの債務の全部を弁済し、Ｃの同弁済後に、甲土地はＡからDに譲渡された。この場合において、Ｃは、Dを相手にして、どのような権利の確保のために、どのような手続きを経た上で、どのような権利を行使することができるか。40字程度で記述しなさい。", "modelAnswer": "－"}, {"source": "平成22年（2010年）問46", "year": "平成22年", "seireki": 2010, "qnum": 46, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "problemText": "民法改正に伴い、問題が使えなくなりましたので、解説は省略します。\n以下の【相談】に対して、〔　〕の中に適切な文章を40字程度で記述して補い、最高裁判所の判例を踏まえた【回答】を完成させなさい。\n【相談】\n私は、Ｘ氏から200万円を借りていますが、先日自宅でその返済に関してＸ氏と話し合いをしているうちに口論になり、激昂したＸ氏が投げた灰皿が、居間にあったシャンデリア(時価150万円相当)に当たり、シャンデリアが全損してしまいました。Ｘ氏はこの件については謝罪し、きちんと弁償するとはいっていますが、貸したお金についてはいますぐにでも現金で返してくれないと困るといっています。私としては、損害賠償額を差し引いて50万円のみ払えばよいと思っているのですが、このようなことはできるでしょうか。\n【回答】\n民法509条は「債務が不法行為によって生じたときは、その債務者は、相殺をもって債権者に対抗することができない。」としています。その趣旨は、判例によれば〔　　　　　〕ことにあるとされています。ですから今回の場合のように、不法行為の被害者であるあなた自身が自ら不法行為にもとづく損害賠償債権を自働債権として、不法行為による損害賠償債権以外の債権を受働債権として相殺をすることは、禁止されていません。", "modelAnswer": "－"}, {"source": "平成21年（2009年）問44", "year": "平成21年", "seireki": 2009, "qnum": 44, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "problemText": "Ｘは、外務大臣に対して旅券の発給を申請したが拒否処分をうけたため、取消訴訟を提起した。これについて、裁判所は、旅券法により義務づけられた理由の提示が不充分であるとして、請求を認容する判決をなし、これが確定した。この場合、行政事件訴訟法によれば、外務大臣は、判決のどのような効力により、どのような対応を義務づけられるか。40字程度で記述しなさい。", "modelAnswer": "外務大臣は、判決の拘束力により、再度、申請に対する処分を行うことを義務付けられる。"}, {"source": "平成21年（2009年）問45", "year": "平成21年", "seireki": 2009, "qnum": 45, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "problemText": "次の【事例】において、Ｘは、Ｙに対して、どのような権利について、どのような契約に基づき、どのような請求をすることができるか。40字程度で記述しなさい。\n【事例】\nＡ（会社）は、Ｂ（銀行）より消費貸借契約に基づき金銭を借り受け、その際に、Ｘ（信用保証協会）との間でＢに対する信用保証委託契約を締結し、Ｘは、同契約に基づき、ＡのＢに対する債務につき信用保証をした。Ｘは、それと同時に、Ｙとの間で、Ａが信用保証委託契約に基づきＸに対して負担する求償債務についてＹが連帯保証する旨の連帯保証契約を締結した。ＡがＢに対する上記借入債務の弁済を怠り、期限の利益を失ったので、Ｘは、Ｂに対して代位弁済をした。", "modelAnswer": "Ａに対する求償権について、連帯保証契約に基づき、求償債務の弁済を請求することができる。"}, {"source": "平成21年（2009年）問46", "year": "平成21年", "seireki": 2009, "qnum": 46, "subject": "行政法", "title": "行政書士の通信教育・通信講座", "problemText": "", "modelAnswer": ""}];

let mode = 'taki';          // 'taki' | 'kijutsu'

function buildYearOptions() {
  const years = [...new Set(TAKI.map(q => q.year))];
  const sel = document.getElementById('yearFilter');
  years.forEach(y => {
    const opt = document.createElement('option');
    opt.value = y;
    opt.textContent = y;
    sel.appendChild(opt);
  });
}

function switchMode(m) {
  mode = m;
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', (i === 0 && m === 'taki') || (i === 1 && m === 'kijutsu'));
  });
  document.getElementById('takiSection').classList.toggle('hidden', m !== 'taki');
  document.getElementById('kijutsuSection').classList.toggle('hidden', m !== 'kijutsu');
  updateNavCount();
  if (m === 'taki') loadTaki(takiIdx);
  else loadKijutsu(kijutsuIdx);
}

function applyFilter() {
  const year = document.getElementById('yearFilter').value;
  if (year) {
    filteredTaki = TAKI.filter(q => q.year === year);
    filteredKijutsu = KIJUTSU.filter(k => k.year === year);
  } else {
    filteredTaki = [...TAKI];
    filteredKijutsu = [...KIJUTSU];
  }
  takiIdx = 0;
  kijutsuIdx = 0;
  if (mode === 'taki') loadTaki(0);
  else loadKijutsu(0);
}

function goRandom() {
  if (mode === 'taki') {
    takiIdx = Math.floor(Math.random() * filteredTaki.length);
    loadTaki(takiIdx);
  } else {
    kijutsuIdx = Math.floor(Math.random() * filteredKijutsu.length);
    loadKijutsu(kijutsuIdx);
  }
}

function goPrev() {
  if (mode === 'taki') {
    takiIdx = (takiIdx - 1 + filteredTaki.length) % filteredTaki.length;
    loadTaki(takiIdx);
  } else {
    kijutsuIdx = (kijutsuIdx - 1 + filteredKijutsu.length) % filteredKijutsu.length;
    loadKijutsu(kijutsuIdx);
  }
}

function goNext() {
  if (mode === 'taki') {
    takiIdx = (takiIdx + 1) % filteredTaki.length;
    loadTaki(takiIdx);
  } else {
    kijutsuIdx = (kijutsuIdx + 1) % filteredKijutsu.length;
    loadKijutsu(kijutsuIdx);
  }
}

function updateNavCount() {
  const total = mode === 'taki' ? filteredTaki.length : filteredKijutsu.length;
  const idx = mode === 'taki' ? takiIdx : kijutsuIdx;
  document.getElementById('navCount').textContent = (idx + 1) + ' / ' + total;
}

// ======== 多肢選択式 ========
function loadTaki(idx) {
  stopSpeak();
  takiIdx = idx;
  updateNavCount();
  const q = filteredTaki[idx];
  if (!q) return;

  document.getElementById('takiTag').textContent = q.source;
  document.getElementById('takiTitle').textContent = '多肢選択式 ' + q.subject;

  current = 0;
  answers = q.blanks.map(() => null);
  shuffledChoices = shuffle([...q.choices]);

  document.getElementById('qText').innerHTML = q.questionHtml;
  document.getElementById('selectArea').classList.remove('hidden');
  document.getElementById('resultCard').classList.add('hidden');
  document.getElementById('takiSection').classList.add('dock-on');

  updateProgress(q);
  updateActiveBlank(q);
  renderChoices(q);
  autoSpeak();
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function updateProgress(q) {
  const done = answers.filter(a => a !== null).length;
  const total = q.blanks.length;
  const pct = (done / total) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = done + ' / ' + total;
}

function updateActiveBlank(q) {
  q.blanks.forEach((b, i) => {
    document.querySelectorAll('[data-label="' + b.label + '"]').forEach(el => {
      el.classList.remove('active');
      if (answers[i] === null && i === current) el.classList.add('active');
    });
  });
  if (current < q.blanks.length) {
    document.getElementById('curLabel').textContent = q.blanks[current].label + ' を選んでください';
  }
}

function renderChoices(q) {
  const grid = document.getElementById('choices');
  grid.innerHTML = '';
  const usedTexts = answers.filter(a => a !== null);
  shuffledChoices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn' + (usedTexts.includes(c.text) ? ' used' : '');
    btn.textContent = c.text;
    btn.onclick = () => selectAnswer(c.text, q);
    grid.appendChild(btn);
  });
}

function selectAnswer(choiceText, q) {
  if (current >= q.blanks.length) return;
  stopSpeak();
  answers[current] = choiceText;

  const b = q.blanks[current];
  const isCorrect = choiceText === b.answer;

  // 透明で入れてある正解を表示し、正誤で色を変える（幅は確定済みなのでずれない）
  document.querySelectorAll('[data-label="' + b.label + '"]').forEach(el => {
    el.classList.remove('active');
    el.classList.add('answered', isCorrect ? 'correct' : 'wrong');
  });

  current++;
  updateProgress(q);

  if (current >= q.blanks.length) {
    showTakiResult(q);
  } else {
    updateActiveBlank(q);
    renderChoices(q);
  }
}

function showTakiResult(q) {
  document.getElementById('selectArea').classList.add('hidden');
  document.getElementById('takiSection').classList.remove('dock-on');

  const score = answers.filter((a, i) => a === q.blanks[i].answer).length;
  const msgs = ['もう一度！', 'あと少し！', 'いい感じ！', 'ほぼ完璧！', '満点！'];
  const rc = document.getElementById('resultCard');
  rc.classList.remove('hidden');

  let html = `<div class="result-score">${score}<span> / ${q.blanks.length}</span></div>
    <div class="result-label">${msgs[score] || ''}</div>
    <div class="result-detail">`;

  q.blanks.forEach((b, i) => {
    const ok = answers[i] === b.answer;
    html += `<div class="result-row">
      <span class="rr-icon">${ok ? 'O' : 'X'}</span>
      <span class="rr-label">${b.label}</span>
      <div class="rr-answer">${b.answer}${!ok ? `<div class="rr-your">あなた：${answers[i]}</div>` : ''}</div>
    </div>`;
  });

  html += `</div>
    <button class="btn-next-q" onclick="goNext()">次の問題へ</button>`;

  rc.innerHTML = html;
}

// ======== 記述式 ========
function loadKijutsu(idx) {
  stopSpeak();
  kijutsuIdx = idx;
  updateNavCount();
  const k = filteredKijutsu[idx];
  if (!k) return;

  document.getElementById('kijutsuTag').textContent = k.source;
  document.getElementById('kijutsuTitle').textContent = '記述式 ' + k.subject;
  document.getElementById('kijutsuProblem').textContent = k.problemText;
  document.getElementById('revealBtn').classList.remove('hidden');
  document.getElementById('answerBox').classList.add('hidden');
  document.getElementById('answerText').textContent = k.modelAnswer || '（解答データなし）';
  autoSpeak();
}

function revealAnswer() {
  document.getElementById('revealBtn').classList.add('hidden');
  document.getElementById('answerBox').classList.remove('hidden');
}

// ======== 音声読み上げ ========
const ttsOK = ('speechSynthesis' in window);
let autoRead = true;
let speaking = false;

// 問題文を読み上げ用テキストに変換。
// 空欄は、未回答ならラベル（ア/イ…）、回答済みなら入った答えを読む。
function buildTakiReadText() {
  const root = document.getElementById('qText');
  let out = '';
  function walk(node) {
    node.childNodes.forEach(function(c) {
      if (c.nodeType === 3) {
        out += c.textContent;
      } else if (c.nodeType === 1) {
        if (c.classList && c.classList.contains('blank')) {
          if (c.classList.contains('answered')) {
            out += '、' + c.querySelector('.bl-ans').textContent + '、';
          } else {
            out += '、' + c.getAttribute('data-label') + '、';
          }
        } else if (c.tagName === 'BR') {
          out += '。';
        } else {
          walk(c);
        }
      }
    });
  }
  walk(root);
  return out;
}

function currentReadText() {
  if (mode === 'taki') return buildTakiReadText();
  return document.getElementById('kijutsuProblem').textContent;
}

function updateSpeakBtn() {
  const b = document.getElementById('speakBtn');
  if (!b) return;
  b.textContent = speaking ? '停止' : '読み上げ';
  b.classList.toggle('speaking', speaking);
}

function stopSpeak() {
  if (ttsOK) speechSynthesis.cancel();
  speaking = false;
  updateSpeakBtn();
}

function speakCurrent() {
  if (!ttsOK) return;
  if (speaking) { stopSpeak(); return; }
  const text = currentReadText();
  if (!text) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ja-JP';
  u.rate = 1.0;
  u.onend = function() { speaking = false; updateSpeakBtn(); };
  u.onerror = function() { speaking = false; updateSpeakBtn(); };
  speaking = true;
  updateSpeakBtn();
  speechSynthesis.speak(u);
}

// 問題を開いたときの自動読み上げ
function autoSpeak() {
  if (autoRead && ttsOK) speakCurrent();
}

function toggleAuto() {
  autoRead = document.getElementById('autoReadChk').checked;
  if (!autoRead) stopSpeak();
}

// 初期化
buildYearOptions();
applyFilter();
</script>
